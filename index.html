<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Databao</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Fallback styles — page works even if Tailwind CDN doesn't load */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body { background: #fafafa; color: #18181b; font-family: ui-sans-serif, system-ui, sans-serif; }
    #app { min-height: 100%; }
    .flex { display: flex; }
    .inline-flex { display: inline-flex; }
    .flex-col { flex-direction: column; }
    .flex-1 { flex: 1; }
    .items-center { align-items: center; }
    .justify-center { justify-content: center; }
    .justify-between { justify-content: space-between; }
    .justify-end { justify-content: flex-end; }
    .gap-2 { gap: .5rem; }
    .gap-3 { gap: .75rem; }
    .shrink-0 { flex-shrink: 0; }
    .h-8 { height: 2rem; }
    .flex-wrap { flex-wrap: wrap; }
    .h-screen { min-height: 100vh; }
    .overflow-hidden { overflow: hidden; }
    .overflow-y-auto { overflow-y: auto; }
    .text-center { text-align: center; }
    .text-sm { font-size: .875rem; }
    .text-xs { font-size: .75rem; }
    .text-3xl { font-size: 1.875rem; }
    .font-bold { font-weight: 700; }
    .font-semibold { font-weight: 600; }
    .leading-none { line-height: 1; }
    .text-zinc-400 { color: #a1a1aa; }
    .text-zinc-600 { color: #52525b; }
    .text-zinc-700 { color: #3f3f46; }
    .text-zinc-800 { color: #27272a; }
    .text-zinc-900 { color: #18181b; }
    .text-white { color: #fff; }
    .bg-white { background: #fff; }
    .bg-zinc-50 { background: #fafafa; }
    .bg-zinc-100 { background: #f4f4f5; }
    .bg-violet-500 { background: #8b5cf6; }
    .rounded-xl { border-radius: .75rem; }
    .rounded-2xl { border-radius: 1rem; }
    .rounded-md { border-radius: .375rem; }
    .rounded-\[20px\] { border-radius: 20px; }
    .rounded-full { border-radius: 9999px; }
    .border { border: 1px solid #e4e4e7; }
    .border-zinc-200 { border-color: #e4e4e7; }
    .shadow-sm { box-shadow: 0 1px 2px rgb(0 0 0 / .05); }
    .p-6 { padding: 1.5rem; }
    .p-10 { padding: 2.5rem; }
    .px-6 { padding-left: 1.5rem; padding-right: 1.5rem; }
    .px-4\.5 { padding-left: 1.125rem; padding-right: 1.125rem; }
    .py-3 { padding-top: .75rem; padding-bottom: .75rem; }
    .py-5 { padding-top: 1.25rem; padding-bottom: 1.25rem; }
    .mb-3 { margin-bottom: .75rem; }
    .mb-4 { margin-bottom: 1rem; }
    .mb-7 { margin-bottom: 1.75rem; }
    .max-w-lg { max-width: 32rem; }
    .max-w-sm { max-width: 24rem; }
    .mx-auto { margin-left: auto; margin-right: auto; }
    .w-full { width: 100%; }
    .cursor-pointer { cursor: pointer; }
    button { font: inherit; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    textarea, input { font: inherit; border: none; }
    @keyframes db-bounce { 0%,80%,100%{transform:translateY(0);opacity:.3} 40%{transform:translateY(-4px);opacity:1} }
    @keyframes spin { to { transform: rotate(360deg); } }
    .dot { animation: db-bounce 1.1s infinite; }
    .dot:nth-child(2) { animation-delay: .18s; }
    .dot:nth-child(3) { animation-delay: .36s; }
    .spinner { animation: spin .8s linear infinite; }

    /* Workbench: context-primary (asset + chat appendix) vs conversation-primary (chat only) */
    .wb-split {
      flex: 1;
      min-width: 0;
      min-height: 0;
      display: flex;
      overflow: hidden;
    }
    .wb-split--context {
      flex-direction: column;
    }
    @media (min-width: 768px) {
      .wb-split--context { flex-direction: row; }
    }
    .wb-split--context > .wb-pane:not(.wb-chat-shell) {
      flex: 1 1 auto;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 0.75rem 0.75rem 0.25rem;
    }
    .wb-split--context .wb-chat-shell {
      flex: 0 0 auto;
      min-width: 0;
      min-height: 0;
      width: 100%;
      max-height: 42vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 0;
      border-top: 1px solid #e4e4e7;
    }
    @media (min-width: 768px) {
      .wb-split--context .wb-chat-shell {
        width: 22rem;
        max-width: 30vw;
        max-height: none;
        border-top: none;
        border-left: 1px solid #e4e4e7;
        padding: 0;
      }
      .wb-split--context.wb-split--chat-left .wb-chat-shell {
        border-left: 1px solid #e4e4e7;
        border-right: none;
        padding: 0;
      }
      .wb-split--context > .wb-pane:not(.wb-chat-shell) {
        padding: 1rem 0.75rem 1rem 1rem;
      }
      .wb-split--context.wb-split--chat-left > .wb-pane:not(.wb-chat-shell) {
        padding: 1rem 1rem 1rem 0.75rem;
      }
    }
    .wb-split--conversation {
      flex-direction: column;
      align-items: center;
    }
    .wb-split--conversation .wb-chat-shell {
      flex: 1;
      width: 100%;
      max-width: 40rem;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 1rem 1.25rem;
    }
    .wb-pane {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .wb-chat-shell {
      height: 100%;
      min-height: 0;
    }
    .wb-chat-reopen {
      flex: 0 0 2.25rem;
      align-self: stretch;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-left: 1px solid #e4e4e7;
      background: #fff;
      color: #71717a;
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      writing-mode: vertical-rl;
      cursor: pointer;
    }
    .wb-chat-reopen:hover { background: #f4f4f5; color: #3f3f46; }
    .wb-chat-card {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .wb-split--context .wb-chat-card--flat {
      background: transparent;
      border: none;
      box-shadow: none;
      border-radius: 0;
    }
    .wb-split--conversation .wb-chat-card--flat {
      background: #fff;
      border: 1px solid #e4e4e7;
      border-radius: 1rem;
      box-shadow: 0 1px 2px rgb(0 0 0 / 0.05);
    }
    .wb-pane-content {
      height: 100%;
      min-height: 0;
      overflow-y: auto;
      padding: 20px;
    }
    .wb-split--context > .wb-pane:not(.wb-chat-shell) .wb-pane-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow-y: auto;
      background: #fff;
      border: 1px solid #e4e4e7;
      border-radius: 1rem;
      box-shadow: 0 1px 2px rgb(0 0 0 / 0.05);
      padding: 1rem;
    }
    .wb-setup-progress { flex-shrink: 0; }
    .wb-artifact-area {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }
    .wb-artifact-placeholder {
      min-height: 12rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px dashed #e4e4e7;
      border-radius: 0.75rem;
      background: #fafafa;
    }
    .wb-sidebar {
      width: 15rem;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: #fafafa;
      overflow-y: auto;
      height: 100vh;
    }
    @media (max-width: 767px) {
      .wb-sidebar { width: 3.5rem; }
      .wb-sidebar .sidebar-label { display: none; }
      .wb-sidebar .sidebar-section-title { display: none; }
      .wb-sidebar .sidebar-nested { margin-left: 0; border: none; padding-left: 0; }
    }
    .grid-cols-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 0.75rem; }
    .grid-cols-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 0.75rem; }
    @media (max-width: 767px) {
      .grid-cols-2 { grid-template-columns: 1fr; }
      .grid-cols-3 { grid-template-columns: 1fr; }
    }
    .landing-panel {
      flex: 1;
      width: 100%;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fff;
      padding: 2rem 1.5rem;
      text-align: center;
    }
    .landing-inner {
      width: 100%;
      max-width: 32rem;
    }
    .landing-input-row {
      width: 100%;
      max-width: 24rem;
      margin-left: auto;
      margin-right: auto;
    }
    .min-w-0 { min-width: 0; }
    .h-full { height: 100%; }
    .space-y-1\.5 > * + * { margin-top: .375rem; }
    .space-y-2 > * + * { margin-top: .5rem; }
    [data-action="add-context"] {
      cursor: pointer;
      transition: background 0.12s, box-shadow 0.12s;
    }
    [data-action="add-context"]:hover {
      background: rgba(139, 92, 246, 0.05);
      box-shadow: inset 0 0 0 1px rgba(139, 92, 246, 0.18);
    }
    [data-action="add-context"].wb-context-active {
      background: rgba(139, 92, 246, 0.08);
      box-shadow: inset 0 0 0 1px rgba(139, 92, 246, 0.35);
    }
  </style>
</head>
<body class="bg-zinc-50">
  <noscript><p style="padding:2rem">JavaScript is required. Enable it and reload.</p></noscript>
  <div id="app"><p style="padding:2rem;color:#71717a">Loading Databao…</p></div>
  <script>
(function () {
  const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  const cn = (...c) => c.filter(Boolean).join(" ");

  const LOGO = (size=28) => `<svg width="${size}" height="${size}" viewBox="0 0 500 500" fill="none" style="flex-shrink:0"><path d="M276.733 140.669C295.862 127.455 318.256 118.562 342.403 115.369C353.378 113.919 362.392 123.037 362.392 134.112V177.067C346.446 177.067 331.621 181.234 318.921 188.453C314.472 190.982 315.57 197.33 320.393 199.041C380.416 218.699 439.425 258.714 448.436 313.854C457.447 368.994 426.958 413 371.606 413H128.394C73.0423 413 42.5534 368.994 51.5641 313.854C60.5751 258.714 119.583 218.699 179.606 199.041C184.429 197.33 185.528 190.982 181.079 188.453C168.379 181.234 153.554 177.067 137.608 177.067V134.112C137.608 123.037 146.621 113.919 157.595 115.369C181.743 118.562 204.138 127.455 223.267 140.669V87.0001H276.733V140.669Z" fill="#7E42FF"/><path d="M254.73 298.872C254.73 311.526 244.477 321.785 231.829 321.785C219.181 321.785 208.927 311.526 208.927 298.872C208.927 286.217 219.181 275.959 231.829 275.959C244.477 275.959 254.73 286.217 254.73 298.872Z" fill="white"/><path d="M380.687 298.872C380.687 311.526 370.434 321.785 357.786 321.785C345.138 321.785 334.884 311.526 334.884 298.872C334.884 286.217 345.138 275.959 357.786 275.959C370.434 275.959 380.687 286.217 380.687 298.872Z" fill="white"/></svg>`;
  const ICON = {
    check: `<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>`,
    arrow: `<svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>`,
    mic: `<svg class="w-4 h-4 text-zinc-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>`,
    clock: `<svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>`,
    sparkles: `<svg class="w-3.5 h-3.5 text-violet-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m12 3-1.9 5.8L4 12l6.1 3.2L12 21l1.9-5.8L20 12l-6.1-3.2Z"/></svg>`,
    alert: `<svg class="w-4 h-4 text-amber-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>`,
    trend: `<svg class="w-4 h-4 text-violet-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m22 7-8.5 8.5-5-5L2 17"/><path d="M16 7h6v6"/></svg>`,
    file: `<svg class="w-3 h-3 opacity-50" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/></svg>`,
    edit: `<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>`,
  };

  const USER_ROLES = [
    "Market expert",
    "Product manager",
    "Revenue Ops",
    "Analyst",
  ];
  const ONBOARDING_CAPS = ["Analyse a dataset", "Monitor a KPI", "Run reports on schedule", "Forecast something", "Something else"];
  const ONBOARDING_GREETING = "Hi, I'm Databao. I can take data tasks off your plate. How can I help you today?";

  const ACHIEVEMENT_SUGGESTIONS = {
    "Analyse a dataset": ["Find trends and outliers", "Compare segments", "Summarize key metrics", "Something else"],
    "Monitor a KPI": ["Keep KPIs healthy", "Track revenue & churn", "Alert me when metrics drop", "Something else"],
    "Run reports on schedule": ["Weekly stakeholder report", "Daily ops snapshot", "Monthly board summary", "Something else"],
    "Forecast something": ["Project next quarter revenue", "Estimate churn risk", "Model growth scenarios", "Something else"],
    "Something else": ["Save time on recurring work", "Make data-driven decisions", "Keep the team aligned", "Describe it myself"],
  };

  function achievementSuggestions(capability) {
    return ACHIEVEMENT_SUGGESTIONS[capability] || ["Keep KPIs healthy", "Save time on recurring work", "Make data-driven decisions", "Something else"];
  }

  const SCHEDULE_OPTIONS = [
    "Specific time every day, week, or month",
    "Regularly in minutes, hours, or days intervals",
    "Based on a specific condition (new email, calendar, etc.)",
    "Something else",
  ];

  const DATA_CONNECTIONS = [
    { name: "Snowflake", emoji: "❄️", desc: "Data warehouse" },
    { name: "BigQuery", emoji: "📊", desc: "Google Cloud warehouse" },
    { name: "Google Sheets", emoji: "📋", desc: "Spreadsheets" },
    { name: "PostgreSQL", emoji: "🐘", desc: "Database" },
    { name: "dbt Cloud", emoji: "🔧", desc: "Transformations" },
    { name: "S3", emoji: "🪣", desc: "Object storage" },
    { name: "Google Analytics", emoji: "📈", desc: "Web & campaign analytics" },
    { name: "HubSpot", emoji: "🧲", desc: "Marketing CRM" },
    { name: "Meta Ads", emoji: "📣", desc: "Paid social data" },
    { name: "Mixpanel", emoji: "📱", desc: "Product analytics" },
    { name: "Amplitude", emoji: "📊", desc: "Behavioral analytics" },
    { name: "Salesforce", emoji: "☁️", desc: "CRM & pipeline" },
  ];

  const ROLE_CONNECTIONS = {
    "Market expert": ["Google Analytics", "Google Sheets", "HubSpot", "Meta Ads"],
    "Product manager": ["Mixpanel", "Amplitude", "PostgreSQL", "Google Sheets"],
    "Revenue Ops": ["Salesforce", "Snowflake", "BigQuery", "Google Sheets"],
    "Analyst": ["Snowflake", "BigQuery", "PostgreSQL", "dbt Cloud", "S3"],
  };

  function connectionsForRole(role) {
    const names = ROLE_CONNECTIONS[role];
    if (!names) return DATA_CONNECTIONS;
    return names.map((n) => DATA_CONNECTIONS.find((c) => c.name === n)).filter(Boolean);
  }

  const SCRIPT = [
    { reply: "What would you like to achieve with that?", suggestions: null, artifact: { planStep: 2 } },
    { reply: "Would you like to automate this task to run regularly?", suggestions: ["Yes", "No"], artifact: { planStep: 2 } },
    { reply: "Should we run this task…", suggestions: SCHEDULE_OPTIONS, artifact: { planStep: 2 } },
    { reply: "Where does your data live? Pick a connection below.", ui: () => ({ type: "connectionPicker" }), artifact: { planStep: 3 } },
    { reply: "Here's what I'll set up. Take a look — tweak anything, or execute the first task when you're ready.", artifact: { planStep: 3 } },
    { reply: "Sure — what would you like to change? You can adjust the tasks, the schedule, or the data source.", suggestions: ["Looks good — execute first task", "Change the schedule"], artifact: { planStep: 3 } },
  ];

  function planGoalLabel() {
    const ach = state.ob.achievement;
    const cap = state.ob.capability;
    if (ach && !/^(something else|describe it myself)$/i.test(ach.trim())) return ach.trim();
    return cap || "New goal";
  }

  function planSecondaryTask(capability) {
    const map = {
      "Analyse a dataset": { label: "Quality checks", detail: "Validate freshness and flag anomalies" },
      "Monitor a KPI": { label: "Early warnings", detail: "Alert when a metric moves sharply" },
      "Run reports on schedule": { label: "Draft & deliver", detail: "Format and send when ready" },
      "Forecast something": { label: "Scenario notes", detail: "Document assumptions and confidence" },
      "Something else": { label: "Follow-up", detail: "Review output and refine next steps" },
    };
    return map[capability] || map["Something else"];
  }

  function pickAgent(capability, role, achievement) {
    const text = `${capability} ${achievement || ""} ${state.ob.dataSource || ""}`;
    if (/pipeline|dbt|freshness|schema|transform|reliable|postgres|s3/i.test(text)) return "Ada";
    if (role === "Analyst" && /dbt|postgres|s3|bigquery|snowflake/i.test(state.ob.dataSource || "")) return "Ada";
    return "Florence";
  }

  function planPrimaryDetail(source) {
    const parts = [`from ${source}`];
    if (state.ob.wantAutomate && state.ob.schedule) parts.push(scheduleDetail(state.ob.schedule));
    else if (state.ob.wantAutomate) parts.push("automated · recurring");
    else parts.push("on demand");
    return parts.join(" · ");
  }

  function buildPlan() {
    const source = state.ob.dataSource || "your data source";
    const goal = planGoalLabel();
    const secondary = planSecondaryTask(state.ob.capability);
    return {
      goal,
      agentName: pickAgent(state.ob.capability, state.ob.userRole, state.ob.achievement),
      source,
      tasks: [
        { label: goal, detail: planPrimaryDetail(source) },
        { label: secondary.label, detail: secondary.detail },
      ],
    };
  }

  function userGoalMeta() {
    if (!state.agentInfo?.goal) return null;
    const doc = DOC_CONTENT["kpi-monitoring"];
    return {
      goal: state.agentInfo.goal,
      title: doc?.title || state.agentInfo.goal,
      agent: state.agentInfo.agentName,
      blurb: doc?.annotation?.text || state.agentInfo.summary,
      capability: state.agentInfo.capability,
    };
  }

  function buildUserGoalDoc(plan) {
    const cap = state.ob.capability || "Something else";
    const source = plan.source || state.ob.dataSource || "your data source";
    const role = state.ob.userRole || "your role";
    const goal = plan.goal;
    const agent = plan.agentName;
    const secondary = planSecondaryTask(cap);
    const automated = state.ob.wantAutomate;
    const scheduleText = state.ob.schedule ? scheduleDetail(state.ob.schedule) : (automated ? "automated · recurring" : "on demand");
    const cadence = automated ? scheduleText : "on demand";

    const profiles = {
      "Monitor a KPI": {
        title: goal,
        summary: `Your KPI goal is live. I'll watch metrics from ${source} and ${automated ? "run on your schedule (" + scheduleText + ")" : "refresh whenever you ask"}.`,
        feed: [
          { action: `connected to ${source} and mapped your core KPI tables`, time: "just now" },
          { action: automated ? `scheduled monitoring · ${scheduleText}` : "set up on-demand KPI checks", time: "just now" },
          { action: `configured ${secondary.label.toLowerCase()} — ${secondary.detail.toLowerCase()}`, time: "just now" },
        ],
        metrics: [
          { metric: "Primary KPI", value: "—", change: "tracking", dir: "up", spark: [40, 42, 41, 44, 45, 44, 47] },
          { metric: "Alert threshold", value: "Set", change: "active", dir: "up", spark: [46, 47, 48, 48, 47, 48, 48] },
        ],
        annotation: { topic: "what happens next", text: automated ? `I'm live. Your first scheduled check follows your ${scheduleText} cadence.` : `I'm live. Ask anytime for a fresh read on ${goal.toLowerCase()}.` },
        watching: [`${goal} — ${cadence}`, `${secondary.label} — ${secondary.detail}`, `Data from ${source}`],
      },
      "Analyse a dataset": {
        title: goal,
        summary: `Your analysis goal is set up. I'll explore ${source}, surface trends and outliers, and ${automated ? "refresh on " + scheduleText : "run on demand"}.`,
        feed: [
          { action: `connected to ${source} and profiled the dataset schema`, time: "just now" },
          { action: "ran initial quality checks — freshness and null rates", time: "just now" },
          { action: `queued ${secondary.label.toLowerCase()} — ${secondary.detail.toLowerCase()}`, time: "just now" },
        ],
        metrics: [
          { metric: "Rows scanned", value: "—", change: "profiling", dir: "up", spark: [55, 58, 60, 62, 64, 63, 65] },
          { metric: "Anomalies flagged", value: "0", change: "baseline", dir: "up", spark: [48, 47, 49, 48, 47, 48, 48] },
        ],
        annotation: { topic: "first pass", text: `Tell me what to compare or slice — I'll start from ${source} and report back on ${goal.toLowerCase()}.` },
        watching: [`Dataset freshness in ${source}`, `${secondary.label} — ${secondary.detail}`, `Scope: ${goal}`],
      },
      "Run reports on schedule": {
        title: goal,
        summary: `Your reporting goal is configured. I'll pull from ${source}, draft ${goal.toLowerCase()}, and ${automated ? "deliver on " + scheduleText : "generate on request"}.`,
        feed: [
          { action: `connected to ${source} and mapped report fields`, time: "just now" },

    if (stepIndex === 1) {

    if (stepIndex === 2) {

      return withArtifactTasks(step, state.ob.wantAutomate ? "recurring · schedule TBD" : "data source · pending connection");

        return withArtifactTasks(SCRIPT[3], scheduleDetail(userText));
      }
      return planRevealStep();

    return `<div class="h-1.5 w-40 rounded-full bg-zinc-100 overflow-hidden"><div class="h-full rounded-full bg-violet-500 transition-all" style="width:${pct}%"></div></div>`;
  }
  function typingDots() {
    return `<div class="flex items-center gap-1 pl-8 pt-1">${[0,1,2].map(()=>`<div class="w-1.5 h-1.5 rounded-full bg-zinc-300 dot"></div>`).join("")}</div>`;

  function mockFlorence(q) {
    const s = q.toLowerCase();
    if (s.includes("cohort")) return "Users who saw the new modal retained at 27% on Day-7 vs 41% for those who didn't — a 14pt gap.";
    if (s.includes("confident")) return "Fairly confident — the drop aligns to the deploy date within a day.";
    if (s.includes("next") || s.includes("recommend")) return "I'd revert the modal for a 50% holdout and watch Day-7 for 7 days.";
    return "The active concern is the Day-7 retention drop tied to the Nov 28 modal — want the cohort comparison?";
  }
  function mockAda(q) {
    const s = q.toLowerCase();
    if (s.includes("issue")) return "Nothing blocking. Auto-fixed a freshness breach on fct_orders_daily this morning.";
    if (s.includes("fix")) return "Re-triggered a stalled upstream job and re-ran 14 downstream models — all green.";
    if (s.includes("fresh")) return "All 48 models fresh, 312 of 314 tests passing.";
    return "Everything's green except a minor schema drift on dim_customers I flagged for review.";
  }
  function mockDb(q) {
    const s = q.toLowerCase();
    const w = state.wb;
    if (w.view === "wiki") {
      const folder = KB_FOLDERS.find(f => f.id === w.openWiki) || KB_FOLDERS[0];
      if (!folder) return "Your agent library is empty — assets appear here as agents produce reports, dashboards, and trackers.";
      const assets = folderAssets(folder.id);
      if (s.includes("library") || s.includes("asset") || s.includes("folder")) {
        return assets.length
          ? `This folder has ${assets.length} asset${assets.length === 1 ? "" : "s"}: ${assets.map(a => a.title).join(", ")}. All agents can read and iterate on them.`
          : "Agents publish reports, dashboards, KPI boards, and live trackers into folders here.";
      }
      if (s.includes("agent") || s.includes("produce") || s.includes("who")) {
        const producers = [...new Set(assets.map(a => a.agent))];
        return producers.length ? `${producers.join(" and ")} produced assets in this folder. Any teammate can extend their work.` : "Agents add assets here as they complete tasks.";
      }
      if (s.includes("iterat") || s.includes("build") || s.includes("extend")) {
        return "Yes — the library is shared across the fleet. Florence can refine Ada's dashboards; Ada can wire fresh data into Florence's reports.";
      }
      return `I can help with “${folder.title}” — ask about assets, producers, or what another agent could add next.`;
    }
    if (s.includes("attention")) return "Florence flagged a 14% drop in Day-7 retention tied to the Nov 28 onboarding modal.";
    if (s.includes("summar")) return "This week: 58 tasks done, ~6h saved. Two goals active — KPIs need your call on retention.";
    if (s.includes("retention")) return "Florence traced it to the Nov 28 modal. Want me to open her report?";
    if (s.includes("marketing") || s.includes("goal")) return "I can spin up a new goal — tell me which metrics matter and where the data lives.";
    if (s.includes("library") || s.includes("asset")) {
      const count = Object.keys(KB_ASSETS).length;
      return `The library has ${count} assets across ${KB_FOLDERS.length} folders — reports, dashboards, KPI boards, and live trackers. All agents can read and iterate on them.`;
    }
    if (w.view === "profiles") {
      const created = tryCreateAgentTypeFromDb(q);
      if (created?.created) return `Created agent type "${created.name}" for ${created.role}. Open their profile to customize skills, subagents, or ask them to self-configure in chat.`;
      if (created?.exists) return `"${created.name}" already exists — open their configuration page to refine skills or add subagents.`;
      if (created?.drafted || s.includes("agent type") || s.includes("new agent")) return "Tell me the role and what they should own — e.g. \"Create a marketing analytics agent\" — and I'll draft the full profile.";
      if (s.includes("what agent") || s.includes("types")) return `You have ${Object.keys(PROFILES).length} agent types: ${Object.keys(PROFILES).join(", ")}. Each can own skills, subagents, and produce library assets.`;
    }
    return "I manage your agents and their shared asset library — ask me to route a question, surface recent work, or create a new agent type.";
  }

  function ctxActive(text) {

  }
  function ctxAction(text) {
    return `data-action="add-context" data-context-text="${esc(text.trim())}"`;

  function toggleChatContext(text) {
    const t = text.trim();
    if (!t) return;
    const w = state.wb;
    const idx = w.chatContext.findIndex(c => c.text === t);
    if (idx >= 0) w.chatContext.splice(idx, 1);
    else { w.chatContext.push({ id: Date.now(), text: t }); w.askOpen = true; }

  function chatContextBar() {

    return `<div class="px-5 pt-2 flex flex-wrap gap-1.5 shrink-0">

  function planCard(plan, confirmed, msgIdx) {
    const emoji = { Florence: "👩‍💻", Ada: "🧑‍💻" }[plan.agentName] || "👩‍💻";

      <div class="px-5 py-4">
        <div class="flex items-center gap-2 mb-3"><span class="text-lg">${emoji}</span><div><p class="text-sm font-semibold text-zinc-800">${esc(plan.agentName)}</p><p class="text-xs text-zinc-400">will own this goal</p></div></div>
        ${plan.tasks.map(t=>`<div class="flex items-start gap-2.5 mb-2"><span class="text-violet-400 mt-0.5">${ICON.check}</span><div><p class="text-sm font-medium text-zinc-800">${esc(t.label)}</p><p class="text-xs text-zinc-400">${esc(t.detail)}</p></div></div>`).join("")}
        <div class="flex items-center gap-2 text-xs text-zinc-500 bg-zinc-50 rounded-lg px-3 py-2 mb-4 mt-3"><span>${sourceMeta.emoji}</span><span>Reading from ${esc(plan.source)} · read-only</span></div>

          `<div class="flex gap-2"><button data-action="confirm-plan" data-idx="${msgIdx}" class="flex-1 h-10 rounded-lg bg-violet-500 hover:bg-violet-600 text-white text-sm font-semibold cursor-pointer">Execute first task</button>

  function updateConnButton(key) {
    const input = document.querySelector(`input[data-action="conn-input"][data-key="${CSS.escape(key)}"]`);
    const btn = document.querySelector(`button[data-action="conn-connect"][data-key="${CSS.escape(key)}"]`);
    if (!input || !btn) return;
    const active = input.value.trim().length > 0;
    btn.disabled = !active;
    btn.className = "w-full h-9 rounded-lg text-sm font-semibold transition-colors " +
      (active ? "bg-violet-500 hover:bg-violet-600 text-white cursor-pointer" : "bg-zinc-100 text-zinc-300 cursor-not-allowed");
  }

  function connectionForm(tool, key) {
    const meta = connectionMeta(tool);
    const c = state.ob.conn[key] || { phase: "input", accountId: "", selectedTool: tool };
    const active = c.accountId.trim().length > 0;
    if (c.phase === "done") return `<div class="flex items-center gap-2 text-sm text-green-600 bg-green-50 border border-zinc-200 rounded-xl px-4 py-3">${ICON.check}<span>${esc(tool)} authorized · read-only</span></div>`;
    if (c.phase === "redirecting") return `<div class="border border-zinc-200 rounded-xl px-4 py-5 bg-white shadow-sm flex items-center gap-3"><div class="w-4 h-4 rounded-full border-2 border-zinc-200 border-t-violet-500 spinner"></div><div><p class="text-sm text-zinc-700">Redirecting to ${esc(tool)}…</p></div></div>`;
    return `<div class="border border-zinc-200 rounded-xl overflow-hidden bg-white shadow-sm">
      <div class="px-4 py-3.5 flex items-center gap-3 border-b border-zinc-200"><div class="w-9 h-9 rounded-lg bg-zinc-50 border flex items-center justify-center text-lg">${meta.emoji}</div><div><p class="text-sm font-semibold text-zinc-900">Connect ${esc(tool)}</p><p class="text-xs text-zinc-400">${esc(meta.desc)} · read-only · revoke anytime</p></div></div>
      <div class="px-4 py-3.5 space-y-3"><input data-action="conn-input" data-key="${key}" value="${esc(c.accountId)}" placeholder="Account ID or connection name" class="w-full h-9 px-3 text-sm border border-zinc-200 rounded-lg outline-none focus:border-zinc-200"/>
      <button data-action="conn-connect" data-key="${key}" data-tool="${esc(tool)}" ${active ? "" : "disabled"} class="w-full h-9 rounded-lg text-sm font-semibold transition-colors ${active ? "bg-violet-500 hover:bg-violet-600 text-white cursor-pointer" : "bg-zinc-100 text-zinc-300 cursor-not-allowed"}">Continue with ${esc(tool)} →</button></div></div>`;
  }

  function connectionPicker(key) {
    const c = state.ob.conn[key] || { phase: "pick", selectedTool: null, accountId: "" };
    if (c.phase === "done") {
      const tool = c.selectedTool || state.ob.dataSource || "Snowflake";
      return `<div class="flex items-center gap-2 text-sm text-green-600 bg-green-50 border border-zinc-200 rounded-xl px-4 py-3">${ICON.check}<span>${esc(tool)} authorized · read-only</span></div>`;
    }
    const tiles = connectionsForRole(state.ob.userRole).map(conn => {
      const selected = c.selectedTool === conn.name;
      return `<button data-action="conn-pick" data-key="${key}" data-tool="${esc(conn.name)}" class="text-left p-3.5 rounded-xl border cursor-pointer transition-colors ${selected ? "border-violet-400 bg-violet-50/40 ring-1 ring-violet-200" : "border-zinc-200 bg-white hover:border-violet-300 hover:bg-violet-50/20"}">
        <span class="text-xl leading-none">${conn.emoji}</span>
        <p class="text-sm font-semibold text-zinc-900 mt-2">${esc(conn.name)}</p>
        <p class="text-xs text-zinc-400 mt-0.5">${esc(conn.desc)}</p>
      </button>`;
    }).join("");
    return `<div class="space-y-3">
      <div class="grid grid-cols-2 gap-2">${tiles}
        <button data-action="conn-request" data-key="${key}" class="col-span-2 text-left p-3.5 rounded-xl border border-dashed border-zinc-300 bg-zinc-50 hover:border-zinc-400 hover:bg-zinc-100 cursor-pointer transition-colors">
          <span class="text-xl leading-none">➕</span>
          <p class="text-sm font-semibold text-zinc-700 mt-2">Request a new connection</p>
          <p class="text-xs text-zinc-400 mt-0.5">Don't see your source? Tell us what you need.</p>
        </button>
      </div>
      ${c.selectedTool && c.phase !== "pick" ? connectionForm(c.selectedTool, key) : ""}
    </div>`;
  }

  function setupProgressCompact() {
    const items = [
      { short: "Tasks", full: "Understand your tasks" },
      { short: "Role", full: "Identify your role" },
      { short: "Data", full: "Set up data access" },
      { short: "Execute", full: "Execute first task" },
    ];
    function stepDone(i) {
      if (i === 0) return !!state.ob.capability;
      if (i === 1) return !!state.ob.userRole;
      if (i === 2) return !!state.ob.dataSource;
      if (i === 3) return state.ob.planConfirmed || state.ob.planStep >= 4;
      return false;
    }
    function stepCurrent(i) {
      if (stepDone(i)) return false;
      return stepDone(i - 1) || (i === 0 && !stepDone(0));
    }
    const doneCount = items.filter((_, i) => stepDone(i)).length;
    return `<div class="wb-setup-progress pb-3 mb-3 border-b border-zinc-200">
      <div class="flex items-center justify-between mb-2.5">
        <p class="text-[11px] font-semibold text-zinc-500 uppercase tracking-wide">Set up progress</p>
        <span class="text-[11px] text-zinc-400 tabular-nums">${doneCount}/${items.length}</span>
      </div>
      <div class="flex gap-1.5">
        ${items.map((item, i) => {
          const done = stepDone(i);
          const current = stepCurrent(i);
          return `<div class="flex-1 min-w-0" title="${esc(item.full)}">
            <div class="h-1 rounded-full ${done ? "bg-violet-500" : current ? "bg-violet-300" : "bg-zinc-100"}"></div>
            <div class="flex items-center gap-1 mt-1.5 min-w-0">
              ${done ? `<span class="shrink-0 text-violet-500">${ICON.check.replace('w-4 h-4', 'w-3 h-3')}</span>` : `<span class="shrink-0 ${current ? "text-violet-400" : "text-zinc-200"}"></span>`}
              <p class="text-[10px] truncate ${done ? "text-zinc-400 line-through" : current ? "text-violet-600 font-medium" : "text-zinc-400"}">${esc(item.short)}</p>
            </div>
          </div>`;
        }).join("")}
      </div>
    </div>`;
  }

  function artifactBody() {
    if (state.ob.planConfirmed) {
      const plan = buildPlan();
      const emoji = { Florence: "👩‍💻", Ada: "🧑‍💻" }[plan.agentName] || "👩‍💻";
      return `<div class="border border-zinc-200 rounded-xl overflow-hidden bg-white">

          <div class="min-w-0"><p class="text-sm font-semibold text-zinc-900 truncate">${esc(plan.goal)}</p><p class="text-xs text-zinc-400">${esc(plan.agentName)} · first task running</p></div>

          <div class="flex items-center gap-2 text-xs text-zinc-500 bg-zinc-50 rounded-lg px-3 py-2 mt-2"><span>${sourceMeta.emoji}</span><span>${esc(plan.source)}</span></div>
        </div>
      </div>`;
    }
    return `<div class="wb-artifact-placeholder"><p class="text-sm text-zinc-400 text-center px-6 leading-relaxed">Artifacts from your conversation will appear here</p></div>`;

  function renderOnboarding() {
    const msgs = state.ob.messages.map((msg, i) => {
      const last = i === state.ob.messages.length - 1;
      if (msg.role === "user") return `<div class="flex justify-end"><div class="bg-zinc-100 rounded-[16px_16px_4px_16px] px-3.5 py-2 text-sm text-zinc-800 max-w-sm">${esc(msg.content)}</div></div>`;
      return `<div class="space-y-2.5">
        ${msg.content ? `<p class="text-[15px] leading-relaxed text-zinc-800${msg.isGreeting ? " font-semibold" : ""}">${msg.isGreeting ? esc(msg.content).replace(/\n/g, "<br>") : esc(msg.content)}</p>` : ""}
        ${msg.planCard ? planCard(msg.planCard, state.ob.planConfirmed, i) : ""}
        ${msg.uiWidget?.type === "connectionPicker" ? connectionPicker("m"+i) : ""}

  function chatPanel(id, title, logo, messages, typing, input, placeholder, emptyHtml, opts) {
    const collapsible = opts && opts.collapsible;

      ? `<button data-action="exit-chat-focus" class="text-xs text-zinc-400 hover:text-zinc-600 cursor-pointer">← Back</button>`

      ? `<button data-action="toggle-chat" class="ml-auto text-xs text-zinc-400 hover:text-zinc-600 cursor-pointer" title="Hide chat">Hide</button>`
      : "";
    const body = messages.length === 0 ? emptyHtml : messages.map(m =>
      m.role === "user"
        ? `<div class="flex justify-end"><div class="bg-zinc-100 rounded-[16px_16px_4px_16px] px-3.5 py-2 text-sm max-w-[300px]">${m.context && m.context.length ? `<div class="flex flex-wrap gap-1 mb-1.5">${m.context.map(t => `<span class="text-[10px] bg-violet-100 text-violet-600 rounded px-1.5 py-0.5">${esc(t.length > 40 ? t.slice(0, 37) + "…" : t)}</span>`).join("")}</div>` : ""}${esc(m.content)}</div></div>`
        : `<p class="text-[15px] leading-relaxed text-zinc-800">${esc(m.content)}</p>`
    ).join("");
    return `<div class="wb-pane wb-chat-shell"><div class="wb-chat-card wb-chat-card--flat">
      <div class="px-5 py-3.5 border-b border-zinc-200 flex items-center gap-2 shrink-0">${backBtn}${logo}${collapseBtn}</div>
      <div class="flex-1 overflow-y-auto px-5 py-4 space-y-3 min-h-0">${body}${typing ? `<div class="flex items-center gap-1 pl-7">${[0,1,2].map(()=>`<div class="w-1.5 h-1.5 rounded-full bg-zinc-300 dot"></div>`).join("")}</div>` : ""}</div>

        <input id="${id}-input" value="${esc(input)}" placeholder="${esc(placeholder)}" ${typing?"disabled":""} class="flex-1 text-sm outline-none bg-transparent"/>
        <button data-action="${id}-send" class="w-7 h-7 rounded-full flex items-center justify-center ${!typing && input.trim() ? "bg-violet-500 cursor-pointer" : "bg-zinc-100"}">${ICON.arrow}</button>
      </div></div>

  function parseMockTime(t) {
    if (t === "just now") return 0;
    const m = t.match(/^(\d+)\s*min ago$/);
    if (m) return +m[1];
    const h = t.match(/^(\d+)\s*hr ago$/);
    if (h) return +h[1] * 60;
    const d = t.match(/^(\d+)\s*days? ago$/);
    if (d) return +d[1] * 1440;
    return 9999;
  }

  function getAgentRecentActions(agentName) {
    const profile = PROFILES[agentName];
    if (!profile) return [];
    const actions = [];
    for (const docId of profile.docs) {
      const doc = DOC_CONTENT[docId];
      if (!doc?.feed) continue;
      for (const item of doc.feed) actions.push(item);
    }
    return actions.sort((a, b) => parseMockTime(a.time) - parseMockTime(b.time));
  }

  function agentConfigQuickButtons(name) {
    const qs = [

  }

  function mockAgentConfig(name, q) {
    const a = PROFILES[name];
    if (!a) return "I couldn't find this profile.";
    const s = q.toLowerCase();
    if (!a.persona) a.persona = { skills: [], tone: "", responsibilities: [], boundaries: "", tools: [] };
    if (!a.persona.skills) a.persona.skills = [];
    if (!a.subagents) a.subagents = [];

    if (/subagent|spawn|delegate/.test(s)) {
      let role = "Handles a scoped monitoring task";
      if (s.includes("slack") || s.includes("alert")) role = "Watches #data-alerts and drafts responses";
      else if (s.includes("cohort") || s.includes("retention")) role = "Runs daily cohort checks";
      else if (s.includes("fresh") || s.includes("pipeline")) role = "Monitors pipeline freshness";
      const subName = s.includes("slack") ? "Alert Monitor" : s.includes("cohort") ? "Cohort Runner" : s.includes("fresh") ? "Freshness Scout" : "Task Runner";
      a.subagents.push({ name: subName, emoji: "🛰️", role, status: "online" });
      return `Done — I spawned subagent "${subName}" (${role}). You'll see it under Subagents on my configuration page.`;
    }
    if (/skill|add.*for|expertise/.test(s)) {
      let skillName = "Custom analysis";
      let desc = "Added via chat configuration.";
      if (s.includes("stakeholder") || s.includes("report")) { skillName = "Stakeholder reporting"; desc = "Drafts executive-ready summaries and alert copy."; }
      else if (s.includes("cohort")) { skillName = "Cohort analysis"; desc = "Compares retention curves across product changes."; }
      else if (s.includes("forecast")) { skillName = "Forecasting"; desc = "Builds scenario models from historical series."; }
      else {
        const m = q.match(/skill for (.+)/i) || q.match(/add (?:a )?(.+)/i);
        if (m) { skillName = m[1].trim().replace(/\.$/, ""); desc = `Covers ${skillName.toLowerCase()} for this team.`; }
      }
      if (!a.persona.skills.some(sk => sk.name.toLowerCase() === skillName.toLowerCase())) {
        a.persona.skills.push({ name: skillName, level: "Developing", desc });
      }
      return `Added skill "${skillName}" to my profile. I can refine the description if you want more specificity.`;
    }
    if (/tone|concise|communication|style/.test(s)) {
      a.persona.tone = s.includes("concise")
        ? "Brief and executive-ready — leads with the headline, one supporting chart, then recommendation."
        : "Clear and direct — leads with the number, then context.";
      return "Updated my communication style. I'll apply it in reports and chat going forward.";
    }
    if (/config|skill|subagent/.test(s)) {
      return `You can edit my skills and subagents on the Configuration tab — or just tell me what to add here in chat.`;
    }
    return name === "Ada" ? mockAda(q) : mockFlorence(q);
  }

  function tryCreateAgentTypeFromDb(text) {
    const s = text.toLowerCase();
    const patterns = [
      /create(?: a)?(?: new)? (.+?) agent/i,
      /new agent type for (.+)/i,
      /add (?:a )?(.+?) teammate/i,
      /spin up (?:a )?(.+?) agent/i,
    ];
    let role = "";
    for (const p of patterns) {
      const m = text.match(p);
      if (m) { role = m[1].trim().replace(/\.$/, ""); break; }
    }
    if (!role && (s.includes("agent type") || s.includes("new agent"))) return { drafted: true, role: "" };
    if (!role) return null;
    const name = role.split(/\s+/).map(w => w[0]?.toUpperCase() + w.slice(1)).join(" ").replace(/ analytics$/i, "").trim() || "Morgan";
    if (PROFILES[name]) return { exists: true, name };
    const port = 8642 + Object.keys(PROFILES).length;
    PROFILES[name] = {
      emoji: "🤖", role: role.charAt(0).toUpperCase() + role.slice(1), docs: [], tasks: 0,
      soul: `Owns ${role} — configured by Databao from your description.`,
      tags: [role],
      persona: {
        tone: "Professional and helpful — adapts to your team's communication style.",
        skills: [{ name: role, level: "Developing", desc: `Primary focus: ${role}.` }],
        responsibilities: [`Monitor and report on ${role}`],
        boundaries: "Escalates outside scope to the appropriate teammate.",
        tools: ["Snowflake"],
      },
      subagents: [],
      status: "online", gateway: port, sessions: 0, isDefault: false,
      config: { provider: "Anthropic", model: "claude-sonnet-4", sources: ["Snowflake"], integrations: [] },
    };
    state.wb.profileSessions[name] = [];
    return { created: true, name, role };
  }

    let chat = "";
    const buildingViaChat = w.chatFocused && ["home", "wiki", "profiles"].includes(w.view);
    const chatOpts = { collapsible: !buildingViaChat, showBack: buildingViaChat };
    if (w.view === "home") {
      chat = chatPanel("db", "Databao", LOGO(20), w.dbMessages, w.dbTyping, w.dbInput, "Message Databao…", databaoEmptyState(), chatOpts);
      main = renderHome();
    } else if (w.view === "wiki") {
      chat = chatPanel("db", "Databao", LOGO(20), w.dbMessages, w.dbTyping, w.dbInput, "Message Databao…", databaoEmptyState(), chatOpts);
      main = renderWiki();
    } else if (w.view === "profiles") {
      chat = chatPanel("db", "Databao", LOGO(20), w.dbMessages, w.dbTyping, w.dbInput, "Message Databao…", databaoEmptyState(), chatOpts);
      main = renderProfiles();
    } else if (w.view === "agent") {
      const agentName = w.openAgent;
      const onConfig = w.profileTab === "config";
      const askEmpty = onConfig
        ? `<div class="text-center"><p class="text-sm pb-1 text-left">Configure ${esc(agentName)} via chat</p><p class="text-xs text-zinc-400 pb-3 text-left">${esc(agentName)} can add skills, spawn subagents, and update its persona — changes appear on the Configuration tab.</p>${agentConfigQuickButtons(agentName)}</div>`
        : `<p class="text-sm">Hi, I'm ${esc(agentName)} 👋</p><p class="text-xs text-zinc-400 mt-2">I can read the shared library and build on assets from any agent.${onConfig ? "" : ` <button data-action="profile-tab" data-tab="config" class="text-violet-600 hover:underline cursor-pointer">Open configuration →</button>`}</p>`;
      chat = chatPanel("ask", agentName, `<span class="text-lg">${AGENTS[agentName]?.emoji||""}</span>`, w.askMessages, w.askTyping, w.askInput, onConfig ? `Ask ${agentName} to configure itself…` : `Message ${agentName}…`, askEmpty, chatOpts);
      main = renderAgent();
    } else if (w.view === "doc") {
      const agent = DOC_CONTENT[w.openDoc]?.agent || "Florence";
      const quickQs = w.openDoc === "kpi-monitoring" && state.agentInfo?.goal ? docQuickQuestions() : ["Show the cohort comparison", "How confident are you it's the modal?", "What would you do next?"];
      chat = chatPanel("ask", agent, `<span class="text-lg">${AGENTS[agent]?.emoji||"👩‍💻"}</span>`, w.askMessages, w.askTyping, w.askInput, state.agentInfo?.goal ? `Ask about ${state.agentInfo.goal}…` : "Ask about this report…",
        `<div class="text-center"><p class="text-sm pb-3 text-left">Hi, I'm ${esc(agent)} 👋${state.agentInfo?.goal ? ` · working on <span class="font-medium">${esc(state.agentInfo.goal)}</span>` : ""}</p>
        ${quickQs.map(q=>`<button data-action="ask-quick" data-text="${esc(q)}" class="w-full text-left text-sm px-3.5 py-2.5 rounded-xl border mb-2 cursor-pointer">${esc(q)}</button>`).join("")}</div>`, chatOpts);
      main = renderDoc();
    }
    const chatReopen = chat && !w.askOpen && !buildingViaChat
      ? `<button data-action="toggle-chat" class="wb-chat-reopen" title="Open chat">Chat</button>`
      : "";
    const split = buildingViaChat && chat
      ? `<div class="wb-split wb-split--conversation">${chat}</div>`
      : chat && w.askOpen
        ? `<div class="wb-split wb-split--context">${main}${chat}</div>`
        : `<div class="wb-split wb-split--context">${main}${chatReopen}</div>`;
    return `<div class="flex h-screen bg-zinc-50 overflow-hidden font-sans min-h-0">${sidebar()}${split}</div>`;
  }

  function render() {
    const app = document.getElementById("app");
    if (state.phase === "onboarding") {
      app.innerHTML = state.ob.screen === "landing" ? renderLanding() : renderOnboarding();
    } else {
      app.innerHTML = renderWorkbench();
    }
    bind();
    const chat = document.getElementById("ob-chat");
    if (chat) chat.scrollTop = chat.scrollHeight;
  }

  function skipOnboarding() {
    state.phase = "product";
    state.wb.view = "home";
    render();
  }

  function startOnboarding(text) {
    if (!text.trim()) return;
    state.ob.screen = "onboarding";
    state.ob.tasks = []; state.ob.planConfirmed = false; state.ob.conn = {};
    state.ob.wantAutomate = false; state.ob.schedule = null; state.ob.userRole = null; state.ob.achievement = null; state.ob.dataSource = null;
    state.ob.capability = text.trim();
    state.ob.planStep = 1;
    state.ob.awaitingRole = true;
    state.ob.msgCount = 0;
    state.ob.messages = [
      { role: "ai", content: ONBOARDING_GREETING, isGreeting: true },
      { role: "user", content: text.trim() },
      { role: "ai", content: "What is your role?", suggestions: USER_ROLES },
    ];
    render();
  }

  function respondScripted(userText, stepIndex) {
    state.ob.typing = true; render();
    setTimeout(() => {
      state.ob.typing = false;
      const step = getScriptStep(stepIndex, userText);
      if (step.artifact?.tasks) state.ob.tasks = step.artifact.tasks;
      if (step.artifact?.planStep !== undefined) state.ob.planStep = Math.max(state.ob.planStep, step.artifact.planStep);
      state.ob.messages.push({ role: "ai", content: step.reply, suggestions: step.suggestions || null, uiWidget: step.ui ? step.ui(userText) : null, planCard: step.planCard || null });
      render();
    }, 850 + Math.random() * 400);
  }

  function obSend(text) {
    if (!text.trim() || state.ob.typing) return;
    state.ob.input = "";
    state.ob.messages.push({ role: "user", content: text.trim() });
    if (state.ob.awaitingRole) {
      state.ob.userRole = text.trim();
      state.ob.planStep = 2;
      state.ob.awaitingRole = false;
      state.ob.msgCount++;
      respondScripted(state.ob.capability, 0);
      return;
    }
    const step = state.ob.msgCount;
    state.ob.msgCount++;
    respondScripted(text.trim(), step);
  }

  function confirmPlan(plan) {
    state.ob.planConfirmed = true;
    state.ob.planStep = 4;
    render();
    setTimeout(() => {
      const userDoc = buildUserGoalDoc(plan);
      const userFolder = setupUserGoalLibrary(plan);
      DOC_CONTENT["kpi-monitoring"] = userDoc;
      const docEntry = DOCUMENTS.find(d => d.id === "kpi-monitoring");
      if (docEntry) {
        docEntry.title = userDoc.title;
        docEntry.agent = plan.agentName;
      }
      state.agentInfo = {
        agentName: plan.agentName,
        summary: `The "${plan.goal}" goal is live.`,
        goal: plan.goal,
        wikiFolder: userFolder.title,
        capability: state.ob.capability,
        achievement: state.ob.achievement,
        role: state.ob.userRole,
        source: plan.source,
      };
      state.phase = "product";
      state.wb.view = "doc";
      state.wb.openDoc = "kpi-monitoring";
      state.wb.openAsset = null;
      state.wb.activeProfile = plan.agentName;
      render();
    }, 650);
  }

  function sendChat(kind, text) {
    if (!text.trim()) return;
    const w = state.wb;
    const context = w.chatContext.length ? w.chatContext.map(c => c.text) : null;
    if (kind === "db") {
      if (w.dbTyping) return;
      w.dbInput = "";
      w.chatContext = [];
      if (["home", "wiki", "profiles"].includes(w.view)) { w.chatFocused = true; w.askOpen = true; }
      w.dbMessages.push({ role: "user", content: text.trim(), context });
      w.dbTyping = true; render();
      setTimeout(() => { w.dbTyping = false; w.dbMessages.push({ role: "agent", content: mockDb(text) }); render(); }, 900);
    } else {
      if (w.askTyping) return;
      w.askInput = "";
      w.chatContext = [];
      w.askMessages.push({ role: "user", content: text.trim(), context });
      if (w.openAgent) w.profileSessions[w.openAgent] = w.askMessages;
      w.askTyping = true; render();
      const agent = w.view === "agent" ? w.openAgent : (DOC_CONTENT[w.openDoc]?.agent || "Florence");
      const onConfig = w.view === "agent" && w.profileTab === "config";
      setTimeout(() => {
        w.askTyping = false;
        w.askMessages.push({ role: "agent", content: onConfig ? mockAgentConfig(agent, text) : mockAgentForGoal(agent, text) });
        if (w.openAgent) {
          w.profileSessions[w.openAgent] = w.askMessages;
          if (PROFILES[w.openAgent]) PROFILES[w.openAgent].sessions = w.askMessages.length;
        }
        render();
      }, 900);
    }
  }

  function bind() {
    const app = document.getElementById("app");
    app.onclick = e => {
      const el = e.target.closest("[data-action]");
      if (!el) return;
      if (el.dataset.action === "modal-stop") return;
      const a = el.dataset.action, t = el.dataset.text, i = el.dataset.i;
      if (a === "skip-onboarding") skipOnboarding();
      if (a === "start-chip" || a === "start-send" || a === "start-continue") startOnboarding(state.ob.input.trim() || t);
      if (a === "ob-send") obSend(t);
      if (a === "ob-send-btn") obSend(state.ob.input);
      if (a === "confirm-plan") confirmPlan(state.ob.messages[+el.dataset.idx].planCard);
      if (a === "edit-plan") obSend("I'd like to change something");
      if (a === "conn-pick") {
        const key = el.dataset.key, tool = el.dataset.tool;
        state.ob.conn[key] = { ...(state.ob.conn[key] || {}), selectedTool: tool, phase: "input", accountId: "" };
        render();
      }
      if (a === "conn-request") {
        state.ob.messages.push(
          { role: "user", content: "Request a new connection" },
          { role: "ai", content: "Noted — we'll follow up on that. In the meantime, connect an existing source below to keep going." }
        );
        render();
      }
      if (a === "conn-connect") {
        const key = el.dataset.key, tool = el.dataset.tool;
        const c = state.ob.conn[key] || { accountId: "" };
        if (!c.accountId.trim()) return;
        c.phase = "redirecting"; c.selectedTool = tool; state.ob.conn[key] = c; render();
        setTimeout(() => { c.phase = "done"; state.ob.dataSource = tool; state.ob.conn[key] = c; render(); setTimeout(() => obSend(tool + " connected"), 400); }, 1400);
      }
      if (a === "add-context") { toggleChatContext(el.dataset.contextText || ""); return; }
      if (a === "remove-context") { state.wb.chatContext = state.wb.chatContext.filter(c => c.id !== +el.dataset.id); render(); return; }
      if (a === "go-home") { state.wb.view = "home"; state.wb.openAsset = null; state.wb.askMessages = []; state.wb.chatContext = []; state.wb.chatFocused = false; render(); }
      if (a === "open-doc") { state.wb.view = "doc"; state.wb.openDoc = el.dataset.doc; state.wb.openAsset = sidebarAssetForDoc(el.dataset.doc); state.wb.askMessages = []; state.wb.chatContext = []; state.wb.chatFocused = false; render(); }
      if (a === "open-agent") { loadProfileChat(el.dataset.agent); state.wb.view = "agent"; state.wb.openAsset = null; state.wb.profileTab = el.dataset.tab || "overview"; state.wb.showAddSkill = false; state.wb.showAddSubagent = false; state.wb.chatContext = []; state.wb.chatFocused = false; render(); }
      if (a === "open-profiles") { state.wb.view = "profiles"; state.wb.openAsset = null; state.wb.chatContext = []; state.wb.chatFocused = false; render(); }
      if (a === "switch-profile") { loadProfileChat(el.dataset.agent); render(); }
      if (a === "profile-tab") { state.wb.profileTab = el.dataset.tab; state.wb.showAddSkill = false; state.wb.showAddSubagent = false; render(); }
      if (a === "toggle-add-skill") { state.wb.showAddSkill = !state.wb.showAddSkill; state.wb.showAddSubagent = false; render(); }
      if (a === "cancel-add-skill") { state.wb.showAddSkill = false; state.wb.newSkill = { name: "", desc: "", level: "Developing" }; render(); }
      if (a === "save-skill") {
        const name = state.wb.openAgent, p = PROFILES[name];
        const sk = state.wb.newSkill;
        if (!p || !sk.name.trim()) return;
        if (!p.persona) p.persona = { skills: [] };
        if (!p.persona.skills) p.persona.skills = [];
        p.persona.skills.push({ name: sk.name.trim(), desc: sk.desc.trim() || "Custom skill.", level: sk.level || "Developing" });
        state.wb.showAddSkill = false;
        state.wb.newSkill = { name: "", desc: "", level: "Developing" };
        render();
      }
      if (a === "remove-skill") {
        const p = PROFILES[state.wb.openAgent];
        if (p?.persona?.skills) p.persona.skills.splice(+el.dataset.i, 1);
        render();
      }
      if (a === "toggle-add-subagent") { state.wb.showAddSubagent = !state.wb.showAddSubagent; state.wb.showAddSkill = false; render(); }
      if (a === "cancel-add-subagent") { state.wb.showAddSubagent = false; state.wb.newSubagent = { name: "", emoji: "🤖", role: "" }; render(); }
      if (a === "save-subagent") {
        const name = state.wb.openAgent, p = PROFILES[name];
        const sub = state.wb.newSubagent;
        if (!p || !sub.name.trim()) return;
        if (!p.subagents) p.subagents = [];
        p.subagents.push({ name: sub.name.trim(), emoji: sub.emoji || "🛰️", role: sub.role.trim() || "Scoped task runner", status: "online" });
        state.wb.showAddSubagent = false;
        state.wb.newSubagent = { name: "", emoji: "🤖", role: "" };
        render();
      }
      if (a === "remove-subagent") {
        const p = PROFILES[state.wb.openAgent];
        if (p?.subagents) p.subagents.splice(+el.dataset.i, 1);
        render();
      }
      if (a === "open-create-profile") { state.wb.showCreateProfile = true; render(); }
      if (a === "close-create-profile") { state.wb.showCreateProfile = false; render(); }
      if (a === "create-profile") {
        const n = state.wb.newProfile, name = n.name.trim();
        if (!name || PROFILES[name]) return;
        const port = 8642 + Object.keys(PROFILES).length;
        PROFILES[name] = {
          emoji: n.emoji || "🤖", role: n.role || "Custom teammate", docs: [], tasks: 0,
          soul: n.soul || "A new teammate cloned from the default profile.",
          tags: n.role ? [n.role] : [],
          persona: {
            tone: "Professional and helpful — adapts to your team's communication style.",
            skills: n.role ? [{ name: n.role, level: "Developing", desc: "Primary focus area for this teammate." }] : [],
            responsibilities: [],
            boundaries: "Escalates tasks outside defined scope to the appropriate teammate.",
            tools: ["Snowflake"],
          },
          subagents: [],
          status: "online", gateway: port, sessions: 0, isDefault: false,
          config: { provider: "Anthropic", model: "claude-sonnet-4", sources: ["Snowflake"], integrations: [] },
        };
        state.wb.profileSessions[name] = [];
        state.wb.activeProfile = name;
        state.wb.showCreateProfile = false;
        state.wb.newProfile = { name: "", emoji: "🤖", role: "", soul: "" };
        loadProfileChat(name);
        state.wb.view = "agent";
        state.wb.profileTab = "config";
        render();
      }
      if (a === "open-wiki") { state.wb.view = "wiki"; state.wb.openWiki = el.dataset.wiki; state.wb.openAsset = null; state.wb.chatContext = []; state.wb.chatFocused = false; render(); }
      if (a === "open-asset") {
        const asset = KB_ASSETS[el.dataset.asset];
        if (!asset?.docId) return;
        state.wb.view = "doc";
        state.wb.openDoc = asset.docId;
        state.wb.openAsset = asset.id;
        state.wb.openWiki = asset.folderId;
        state.wb.chatContext = [];
        state.wb.chatFocused = false;
        render();
      }
      if (a === "toggle-chat") { state.wb.askOpen = !state.wb.askOpen; render(); }
      if (a === "exit-chat-focus") { state.wb.chatFocused = false; render(); }
      if (a === "dismiss-need") { state.wb.doneNeeds.push(+i); render(); }
      if (a === "db-send") sendChat("db", state.wb.dbInput);
      if (a === "db-quick") sendChat("db", t);
      if (a === "ask-send") sendChat("ask", state.wb.askInput);
      if (a === "ask-quick") sendChat("ask", t);
    };
    app.oninput = e => {
      if (e.target.id === "landing-input") state.ob.input = e.target.value;
      if (e.target.id === "ob-input") state.ob.input = e.target.value;
      if (e.target.id === "db-input") state.wb.dbInput = e.target.value;
      if (e.target.id === "ask-input") state.wb.askInput = e.target.value;
      if (e.target.dataset.action === "conn-input") {
        const key = e.target.dataset.key;
        state.ob.conn[key] = { ...(state.ob.conn[key]||{}), accountId: e.target.value, phase: "input" };
        updateConnButton(key);
      }
      if (e.target.dataset.action === "new-profile-field") {
        state.wb.newProfile[e.target.dataset.field] = e.target.value;
        render();
      }
      if (e.target.dataset.action === "skill-field") {
        state.wb.newSkill[e.target.dataset.field] = e.target.value;
      }
      if (e.target.dataset.action === "subagent-field") {
        state.wb.newSubagent[e.target.dataset.field] = e.target.value;
      }
    };
    app.onkeydown = e => {
      if (e.key !== "Enter" || e.shiftKey) return;
      if (e.target.id === "landing-input" && state.ob.input.trim()) { e.preventDefault(); startOnboarding(state.ob.input.trim()); }
      if (e.target.id === "ob-input") { e.preventDefault(); obSend(state.ob.input); }
      if (e.target.id === "db-input") { e.preventDefault(); sendChat("db", state.wb.dbInput); }
      if (e.target.id === "ask-input") { e.preventDefault(); sendChat("ask", state.wb.askInput); }
      if (e.target.dataset.action === "conn-input") { e.preventDefault(); e.target.closest("[data-action=conn-connect]")?.click(); }
    };
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", render);
  } else {
    render();
  }
})();
  </script>
</body>
</html>
