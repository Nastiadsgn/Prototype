        if (s.includes("store") || s.includes("what")) return "Runbooks, metric definitions, ownership, gotchas, and stakeholder cadences — anything the fleet needs to stay aligned.";
        if (s.includes("maintain") || s.includes("who")) return "Agents draft and refresh pages; your data team approves changes. Florence and Ada keep their sections current.";
      }
      if (pg.id === "semantic") {
        if (s.includes("what") || s.includes("layer")) return "The semantic layer maps business metrics to warehouse tables — MRR, churn, activation, and 34 canonical definitions synced from dbt.";
        if (s.includes("valid")) return "Agents cross-check queries against these definitions before computing or alerting. Drift between teams gets flagged automatically.";
        if (s.includes("defin") || s.includes("metric")) return "Activation = 3+ core actions within 7 days. I can open Ada's Metric Definitions doc for the full list.";
      }
      if (pg.id === "entities") {
        if (s.includes("entit") || s.includes("map")) return "Core entities: users, accounts, subscriptions, and events — linked via user_id and account_id across fct_* and dim_* models.";
        if (s.includes("relationship")) return "Users belong to accounts; subscriptions roll up to MRR. Event streams tie back to both for retention cohorts.";
        if (s.includes("table") || s.includes("link")) return "dim_users ↔ dim_accounts via account_id; fct_events joins on user_id. Florence uses these for cohort analysis.";
      }
      if (pg.id === "sources") {
        if (s.includes("own") || s.includes("snowflake")) return "Snowflake is the primary warehouse — read-only access, owned by the data platform team. Revoke anytime from settings.";
        if (s.includes("connect") || s.includes("source")) return "Snowflake (live), with spreadsheets archived. All agents read from the semantic layer, not raw tables.";
        if (s.includes("fresh") || s.includes("sla")) return "Critical models refresh daily by 06:00 UTC. Ada monitors freshness and auto-fixes stalled upstream jobs.";
      }
      if (pg.id === "conventions") {
        if (s.includes("gotcha") || s.includes("common")) return "Timezone is always UTC in the warehouse. Signup date ≠ activation date. Null emails in dim_customers are a known 8.4% issue.";
        if (s.includes("nam")) return "fct_* for facts, dim_* for dimensions, stg_* for staging. Metrics use snake_case; dashboards use Title Case.";
        if (s.includes("analyst") || s.includes("new")) return "Start with the glossary and metric definitions. Never query raw events without the activation filter.";
      }
      if (pg.id === "stakeholders") {
        if (s.includes("report") || s.includes("receive")) return "Weekly KPI report goes to #data-alerts and the growth leadership group every Monday 08:00.";
        if (s.includes("cadence") || s.includes("review")) return "KPI review is weekly; pipeline health is daily. Retention deep-dives are ad hoc when Florence flags a drop.";
        if (s.includes("team") || s.includes("depend")) return "Growth, product, and finance depend on MRR and retention metrics. Engineering relies on Ada's pipeline runbooks.";
      }
      if (pg.id === "glossary") {
        if (s.includes("activ")) return "Activation = 3+ core actions within 7 days of signup. It's the north-star input to Day-7 retention.";
        if (s.includes("mrr") || s.includes("arr")) return "MRR = sum of active subscription amounts, normalized monthly. ARR = MRR × 12. We report MRR in weekly KPIs.";
        if (s.includes("retention") || s.includes("day-7")) return "Day-7 retention = % of signups still active 7 days later. Currently 31.2%, down 14% since the Nov 28 modal change.";
      }
      if (pg.id === "runbooks") {
        if (s.includes("fail") || s.includes("pipeline")) return "If a model fails freshness: Ada re-triggers upstream, re-runs downstream, and logs the incident. Escalate if not green in 30 min.";
        if (s.includes("sla") || s.includes("on-call")) return "P1 pipeline breach: 30 min response. P2 schema drift: same business day. On-call rotates through the data platform team.";
        if (s.includes("escalat")) return "L1: Ada auto-remediation → L2: data platform on-call → L3: eng lead if customer-facing metrics are stale past 09:00 UTC.";
      }
      return `I can help with "${pg.title}" — ask about what's documented here or how agents use it.`;
    }
    if (s.includes("attention")) return "Florence flagged a 14% drop in Day-7 retention tied to the Nov 28 onboarding modal.";
    if (s.includes("summar")) return "This week: 58 tasks done, ~6h saved. Two goals active — KPIs need your call on retention.";
    if (s.includes("retention")) return "Florence traced it to the Nov 28 modal. Want me to open her report?";
    if (s.includes("marketing") || s.includes("goal")) return "I can spin up a new goal — tell me which metrics matter and where the data lives.";
    return "I can route that to the right agent or pull a summary across your goals.";
  }

  const WIKI_SUGGESTIONS = {
    overview: ["How do agents use this wiki?", "What should be stored here?", "Who maintains the knowledge base?"],
    semantic: ["What's in the semantic layer?", "How do agents validate metrics?", "Show metric definitions"],
    entities: ["What entities are mapped?", "How are relationships defined?", "Which tables link users to accounts?"],
    sources: ["Who owns Snowflake data?", "Which sources are connected?", "What's the freshness SLA?"],
    conventions: ["What are common gotchas?", "Any naming conventions?", "What should new analysts know?"],
    stakeholders: ["Who receives weekly reports?", "What's the KPI review cadence?", "Which teams depend on this data?"],
    glossary: ["Define activation", "What's MRR vs ARR?", "Explain Day-7 retention"],

  function dbQuickButtons(questions) {

    return `<div class="border border-zinc-200 rounded-xl overflow-hidden max-w-md bg-white shadow-sm">
      <div class="px-5 py-4 border-b border-zinc-200"><p class="text-xs text-zinc-400 mb-1">Here's the plan</p><div class="flex items-center gap-2"><span>🎯</span><p class="text-sm font-bold text-zinc-900">${esc(plan.goal)}</p></div></div>

        <div class="flex items-center gap-2 mb-3"><span class="text-lg">${emoji}</span><div><p class="text-sm font-semibold text-zinc-800">${esc(plan.agentName)}</p><p class="text-xs text-zinc-400">will own this goal</p></div></div>
        ${plan.tasks.map(t=>`<div class="flex items-start gap-2.5 mb-2"><span class="text-violet-400 mt-0.5">${ICON.check}</span><div><p class="text-sm font-medium text-zinc-800">${esc(t.label)}</p><p class="text-xs text-zinc-400">${esc(t.detail)}</p></div></div>`).join("")}

  function updateConnButton(key) {
    const input = document.querySelector(`input[data-action="conn-input"][data-key="${CSS.escape(key)}"]`);
    const btn = document.querySelector(`button[data-action="conn-connect"][data-key="${CSS.escape(key)}"]`);
    if (!input || !btn) return;
    const active = input.value.trim().length > 0;
    btn.disabled = !active;
    btn.className = "w-full h-9 rounded-lg text-sm font-semibold transition-colors " +
      (active ? "bg-violet-500 hover:bg-violet-600 text-white cursor-pointer" : "bg-zinc-100 text-zinc-300 cursor-not-allowed");
  }

  function connectionForm(tool, key) {
    const c = state.ob.conn[key] || { phase: "input", accountId: "" };
    const active = c.accountId.trim().length > 0;
    if (c.phase === "done") return `<div class="flex items-center gap-2 text-sm text-green-600 bg-green-50 border border-zinc-200 rounded-xl px-4 py-3 max-w-sm">${ICON.check}<span>${esc(tool)} authorized · read-only</span></div>`;
    if (c.phase === "redirecting") return `<div class="border border-zinc-200 rounded-xl px-4 py-5 max-w-sm bg-white shadow-sm flex items-center gap-3"><div class="w-4 h-4 rounded-full border-2 border-zinc-200 border-t-violet-500 spinner"></div><div><p class="text-sm text-zinc-700">Redirecting to ${esc(tool)}…</p></div></div>`;
    return `<div class="border border-zinc-200 rounded-xl overflow-hidden max-w-sm bg-white shadow-sm">

      ${d.feed.map(c=>`<div class="flex items-start gap-2.5 mb-2"><span class="text-violet-400 mt-0.5">${ICON.check.replace('w-4','w-3.5')}</span><p class="text-sm text-zinc-600 flex-1">${esc(c.action)}</p><p class="text-xs text-zinc-300">${esc(c.time)}</p></div>`).join("")}</div>

      <div class="grid grid-cols-2 gap-3 mb-6">${d.metrics.map(k=>`<div class="rounded-xl border p-4 ${k.flagged?"border-zinc-200 bg-red-50/40":"border-zinc-200"}"><p class="text-xs text-zinc-400 mb-1">${esc(k.metric)}</p><div class="flex items-end justify-between"><div><p class="text-xl font-bold">${esc(k.value)}</p><p class="text-xs ${k.dir==="up"?"text-green-500":"text-red-400"}">${esc(k.change)}</p></div>${sparkline(k.spark, k.dir!=="up")}</div></div>`).join("")}</div>
      <div class="bg-violet-50/70 border border-violet-200 rounded-xl px-4 py-3 mb-8">${ICON.sparkles}<p class="text-xs font-semibold text-violet-500 mt-1">${esc(d.agent)} noticed</p><p class="text-sm text-zinc-700 mt-1">${esc(d.annotation.text)}</p></div>
      <h2 class="text-base font-bold mb-3">What ${esc(d.agent)} is watching</h2>${d.watching.map(w=>`<div class="flex items-start gap-2.5 mb-2"><span class="text-violet-400">${ICON.check}</span><p class="text-sm text-zinc-600">${esc(w)}</p></div>`).join("")}
    </div></div></div>`;
  }

  function renderWiki() {
    const pg = WIKI_PAGES.find(p => p.id === state.wb.openWiki) || WIKI_PAGES[0];
    return `<div class="wb-pane"><div class="wb-pane-content"><div class="max-w-3xl">
      <h1 class="text-2xl font-bold mb-6"><span>${pg.icon}</span> ${esc(pg.title)}</h1>
      <p class="text-sm text-zinc-600 leading-relaxed">This wiki is the long-term memory for the Growth Analytics project — a living runbook maintained by agents and the data team.</p>
      ${pg.id === "overview" ? `<p class="text-sm text-zinc-600 mt-4">Agents check the semantic layer, conventions, and entity relationships before taking action. Proposed changes are reviewed before merging.</p>` : `<div class="text-sm text-zinc-400 py-12 text-center border border-dashed border-zinc-200 rounded-2xl mt-6">${esc(pg.title)} · content maintained by the fleet</div>`}
    </div></div></div>`;
  }

  function loadProfileChat(name) {
    const w = state.wb;
    if (w.openAgent && w.openAgent !== name) {
      w.profileSessions[w.openAgent] = w.askMessages;
    }
    w.openAgent = name;
    w.activeProfile = name;
    w.askMessages = w.profileSessions[name] ? [...w.profileSessions[name]] : [];
    w.askInput = "";
    w.askTyping = false;
  }

  function profileCard(name, p, active) {
    return `<div class="bg-white rounded-2xl border ${active ? "border-violet-300 ring-1 ring-violet-100" : "border-zinc-200"} shadow-sm p-5 flex flex-col">
      <div class="flex items-start justify-between mb-3">
        <div class="flex items-center gap-3">
          <span class="text-2xl">${p.emoji}</span>
          <div>
            <p class="text-sm font-bold text-zinc-900">${esc(name)}</p>
            <p class="text-xs text-zinc-400">${esc(p.role)}</p>
          </div>
        </div>
        ${active ? `<span class="text-[10px] font-semibold uppercase tracking-wide text-violet-600 bg-violet-50 px-2 py-0.5 rounded-full">Active</span>` : ""}
      </div>
      <p class="text-xs text-zinc-500 leading-relaxed flex-1 mb-4 line-clamp-2">${esc(p.soul)}</p>
      <div class="flex items-center gap-3 text-[11px] text-zinc-400 mb-4">
        <span class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full ${p.status === "online" ? "bg-green-500" : "bg-zinc-300"}"></span>${p.status === "online" ? "Online" : "Offline"}</span>
        <span>·</span><span>:${p.gateway}</span>
        <span>·</span><span>${p.sessions} sessions</span>
      </div>
      <div class="flex gap-2">
        ${active
          ? `<button data-action="open-agent" data-agent="${esc(name)}" class="flex-1 h-9 rounded-lg bg-violet-500 hover:bg-violet-600 text-white text-xs font-semibold cursor-pointer">Open</button>`
          : `<button data-action="switch-profile" data-agent="${esc(name)}" class="flex-1 h-9 rounded-lg border border-zinc-200 hover:bg-zinc-50 text-zinc-700 text-xs font-semibold cursor-pointer">Switch to</button>`}
        <button data-action="open-agent" data-agent="${esc(name)}" class="h-9 px-3 rounded-lg border border-zinc-200 hover:bg-zinc-50 text-zinc-600 text-xs cursor-pointer">Configure</button>
      </div>
    </div>`;
  }

  function createProfileModal() {
    const n = state.wb.newProfile;
    const valid = n.name.trim().length > 0;
    return `<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/30 p-4" data-action="close-create-profile">
      <div class="bg-white rounded-2xl border border-zinc-200 shadow-lg w-full max-w-md p-6" data-action="modal-stop">
        <h2 class="text-lg font-bold text-zinc-900 mb-1">New teammate profile</h2>
        <p class="text-xs text-zinc-400 mb-5">Cloned from default · own persona, config, and session history</p>
        <div class="space-y-3 mb-5">
          <div class="flex gap-3">
            <div class="w-20"><label class="text-[10px] font-semibold text-zinc-400 uppercase tracking-wide">Emoji</label>
            <input data-action="new-profile-field" data-field="emoji" value="${esc(n.emoji)}" class="w-full h-9 px-2 text-center text-lg border border-zinc-200 rounded-lg outline-none mt-1"/></div>
            <div class="flex-1"><label class="text-[10px] font-semibold text-zinc-400 uppercase tracking-wide">Name</label>
            <input data-action="new-profile-field" data-field="name" value="${esc(n.name)}" placeholder="e.g. Morgan" class="w-full h-9 px-3 text-sm border border-zinc-200 rounded-lg outline-none mt-1"/></div>
          </div>
          <div><label class="text-[10px] font-semibold text-zinc-400 uppercase tracking-wide">Role</label>
          <input data-action="new-profile-field" data-field="role" value="${esc(n.role)}" placeholder="e.g. Marketing analytics" class="w-full h-9 px-3 text-sm border border-zinc-200 rounded-lg outline-none mt-1"/></div>
          <div><label class="text-[10px] font-semibold text-zinc-400 uppercase tracking-wide">Persona (SOUL)</label>
          <textarea data-action="new-profile-field" data-field="soul" rows="3" placeholder="What this teammate owns and how they behave…" class="w-full px-3 py-2 text-sm border border-zinc-200 rounded-lg outline-none mt-1 resize-none">${esc(n.soul)}</textarea></div>
        </div>
        <div class="flex gap-2">
          <button data-action="close-create-profile" class="flex-1 h-10 rounded-lg border border-zinc-200 text-zinc-600 text-sm cursor-pointer">Cancel</button>
          <button data-action="create-profile" ${valid ? "" : "disabled"} class="flex-1 h-10 rounded-lg text-sm font-semibold ${valid ? "bg-violet-500 hover:bg-violet-600 text-white cursor-pointer" : "bg-zinc-100 text-zinc-300 cursor-not-allowed"}">Create profile</button>
        </div>
      </div>
    </div>`;
  }

  function renderProfiles() {
    const w = state.wb;
    const names = Object.keys(PROFILES);
    return `<div class="wb-pane"><div class="wb-pane-content"><div class="max-w-4xl mx-auto">
      <div class="flex items-start justify-between mb-2">
        <div>
          <h1 class="text-2xl font-bold text-zinc-900">Teammate profiles</h1>
          <p class="text-sm text-zinc-400 mt-1">Isolated personas — each with its own config, sessions, and gateway port.</p>
        </div>
        <button data-action="open-create-profile" class="h-9 px-4 rounded-lg bg-violet-500 hover:bg-violet-600 text-white text-sm font-semibold cursor-pointer shrink-0">+ New profile</button>
      </div>
      <div class="flex items-center gap-2 text-xs text-zinc-400 bg-zinc-50 border border-zinc-200 rounded-xl px-4 py-3 mb-6">
        <span class="font-mono text-zinc-500">active_profile</span>
        <span>→</span>
        <span class="font-semibold text-zinc-700">${esc(w.activeProfile)}</span>
        <span class="text-zinc-300">·</span>
        <span>gateway <span class="font-mono">127.0.0.1:${PROFILES[w.activeProfile]?.gateway || 8642}</span></span>
      </div>
      <div class="grid grid-cols-2 gap-3 mb-8">
        ${names.map(name => profileCard(name, PROFILES[name], name === w.activeProfile)).join("")}
      </div>
      <h2 class="text-sm font-semibold mb-3">How profiles work</h2>
      <div class="grid grid-cols-3 gap-3">
        ${[["🧠","Persona","Each profile has a SOUL — role, tone, and what they own."],["⚙️","Configuration","Provider, model, data sources, and integrations per profile."],["💬","Sessions","Chat history is isolated. Switch profiles without losing context."]].map(([icon,title,desc])=>`<div class="rounded-xl border border-zinc-200 p-4"><span class="text-lg">${icon}</span><p class="text-sm font-semibold mt-2">${title}</p><p class="text-xs text-zinc-400 mt-1 leading-relaxed">${desc}</p></div>`).join("")}
      </div>
    </div></div>${w.showCreateProfile ? createProfileModal() : ""}</div>`;
  }

  function profileConfigRow(label, value) {
    return `<div class="flex items-center justify-between py-2.5 border-b border-zinc-100 last:border-0"><span class="text-xs text-zinc-400">${esc(label)}</span><span class="text-sm text-zinc-700 font-medium">${esc(value)}</span></div>`;
  }

  function skillLevelClass(level) {
    if (level === "Expert") return "bg-violet-50 text-violet-700 border-violet-100";
    if (level === "Advanced") return "bg-blue-50 text-blue-700 border-blue-100";
    return "bg-zinc-50 text-zinc-600 border-zinc-200";
  }

  function renderPersonaTab(a) {
    const p = a.persona || {};
    const skills = p.skills || [];
    const responsibilities = p.responsibilities || [];
    const tools = p.tools || a.config?.integrations || [];
    const tags = a.tags || [];

    const skillsBlock = skills.length
      ? `<div class="grid grid-cols-1 sm:grid-cols-2 gap-3">${skills.map(s => `<div class="rounded-xl border border-zinc-200 bg-white p-4">
          <div class="flex items-center justify-between gap-2 mb-1.5">
            <p class="text-sm font-semibold text-zinc-900">${esc(s.name)}</p>
            ${s.level ? `<span class="text-[10px] font-semibold uppercase tracking-wide px-2 py-0.5 rounded-full border ${skillLevelClass(s.level)}">${esc(s.level)}</span>` : ""}
          </div>
          <p class="text-xs text-zinc-500 leading-relaxed">${esc(s.desc)}</p>
        </div>`).join("")}</div>`
      : tags.length
        ? `<div class="flex flex-wrap gap-2">${tags.map(t => `<span class="inline-flex items-center text-xs font-medium px-2.5 py-1 rounded-full bg-white text-violet-700 border border-violet-100">${esc(t)}</span>`).join("")}</div>`
        : `<p class="text-xs text-zinc-400">No skills defined yet.</p>`;

    return `<div class="space-y-4">
      <div class="bg-[var(--tw-ring-offset-color)] border border-zinc-200 rounded-2xl p-5">
        <p class="text-[10px] font-semibold text-zinc-400 uppercase tracking-widest mb-2">SOUL.md</p>
        <p class="text-sm text-zinc-700 leading-relaxed">${esc(a.soul)}</p>
      </div>
      <div class="rounded-2xl">
        ${skillsBlock}
      </div>
      ${p.tone ? `<div class="bg-white border border-zinc-200 rounded-2xl p-5">
        <p class="text-[10px] font-semibold text-zinc-400 uppercase tracking-widest mb-2">Communication style</p>
        <p class="text-sm text-zinc-700 leading-relaxed">${esc(p.tone)}</p>
      </div>` : ""}
      ${responsibilities.length ? `<div class="bg-white border border-zinc-200 rounded-2xl p-5">
        <p class="text-[10px] font-semibold text-zinc-400 uppercase tracking-widest mb-3">Responsibilities</p>
        <ul class="space-y-2">${responsibilities.map(r => `<li class="flex items-start gap-2 text-sm text-zinc-700"><span class="text-violet-400 mt-0.5">•</span><span>${esc(r)}</span></li>`).join("")}</ul>
      </div>` : ""}
      ${p.boundaries ? `<div class="bg-white border border-zinc-200 rounded-2xl p-5">
        <p class="text-[10px] font-semibold text-zinc-400 uppercase tracking-widest mb-2">Boundaries</p>
        <p class="text-sm text-zinc-600 leading-relaxed">${esc(p.boundaries)}</p>
      </div>` : ""}
      ${tools.length ? `<div class="bg-white border border-zinc-200 rounded-2xl p-5">
        <p class="text-[10px] font-semibold text-zinc-400 uppercase tracking-widest mb-3">Tools & integrations</p>
        <div class="flex flex-wrap gap-2">${tools.map(t => `<span class="inline-flex items-center text-xs font-medium px-2.5 py-1 rounded-lg bg-zinc-50 text-zinc-700 border border-zinc-200">${esc(t)}</span>`).join("")}</div>
      </div>` : ""}
    </div>`;
  }

  function parseMockTime(t) {
    if (t === "just now") return 0;
    const m = t.match(/^(\d+)\s*min ago$/);
    if (m) return +m[1];
    const h = t.match(/^(\d+)\s*hr ago$/);
    if (h) return +h[1] * 60;
    const d = t.match(/^(\d+)\s*days? ago$/);
    if (d) return +d[1] * 1440;
    return 9999;
  }

  function getAgentRecentActions(agentName) {
    const profile = PROFILES[agentName];
    if (!profile) return [];
    const actions = [];
    for (const docId of profile.docs) {
      const doc = DOC_CONTENT[docId];
      if (!doc?.feed) continue;
      for (const item of doc.feed) actions.push(item);
    }
    return actions.sort((a, b) => parseMockTime(a.time) - parseMockTime(b.time));
  }

  function profileRecentActionsBlock(name) {
    const actions = getAgentRecentActions(name).slice(0, 6);
    return `<div class="flex items-center justify-between mb-3 pt-4">
      <h2 class="text-sm font-semibold">Recent actions</h2>
    </div>
    <div class="bg-white rounded-2xl border border-zinc-200 shadow-sm p-5 mb-6">
      ${actions.length ? actions.map(c => `<div class="flex items-start gap-2.5 mb-2 last:mb-0"><span class="text-violet-400 mt-0.5 shrink-0">${ICON.check.replace('w-4','w-3.5')}</span><p class="text-sm text-zinc-600 flex-1">${esc(c.action)}</p><p class="text-xs text-zinc-300 shrink-0">${esc(c.time)}</p></div>`).join("") : `<p class="text-xs text-zinc-400">No recent actions yet.</p>`}
    </div>`;
  }

  function renderAgent() {
    const name = state.wb.openAgent;
    const a = PROFILES[name];
    if (!a) return "";
    const w = state.wb;
    const tab = w.profileTab || "overview";
    const tabs = [["overview","Overview"],["persona","Persona"],["config","Configuration"]];
    const tabBar = tabs.map(([id,label])=>`<button data-action="profile-tab" data-tab="${id}" class="px-3 py-1.5 rounded-lg text-xs font-medium cursor-pointer ${tab===id?"bg-zinc-200/80 text-zinc-900":"text-zinc-500 hover:bg-zinc-100"}">${label}</button>`).join("");
    let body = "";
    if (tab === "overview") {
      body = `<h2 class="text-sm font-semibold mb-3">Documents ${esc(name)} maintains</h2>
      ${a.docs.map(id=>{const doc=DOCUMENTS.find(d=>d.id===id);return doc?`<button data-action="open-doc" data-doc="${id}" class="w-full text-left bg-white rounded-2xl border border-zinc-200 shadow-sm p-5 hover:border-zinc-200 cursor-pointer mb-2"><p class="text-sm font-bold">${esc(doc.title)}</p><p class="text-xs text-zinc-400 mt-1">Updated ${esc(doc.freshness)}</p></button>`:"";}).join("")}
      ${profileRecentActionsBlock(name)}`;
    } else if (tab === "persona") {
      body = renderPersonaTab(a);
    } else if (tab === "config") {
      body = `<div class="bg-white border border-zinc-200 rounded-2xl px-5 py-1 mb-4">
        ${profileConfigRow("Provider", a.config.provider)}
        ${profileConfigRow("Model", a.config.model)}
        ${profileConfigRow("Data sources", a.config.sources.join(", "))}
        ${profileConfigRow("Integrations", a.config.integrations.join(", "))}
        ${profileConfigRow("Gateway", "127.0.0.1:" + a.gateway)}
        ${profileConfigRow("Profile path", "profiles/" + name.toLowerCase())}
      </div>`;
    } else {
      const msgs = w.profileSessions[name] || w.askMessages || [];
      body = msgs.length === 0
        ? `<div class="text-center py-12 border border-dashed border-zinc-200 rounded-2xl"><p class="text-sm text-zinc-400">No sessions yet — start a conversation in the chat panel.</p></div>`
        : `<div class="space-y-2">${msgs.slice(-5).map(m=>`<div class="rounded-xl border border-zinc-200 px-4 py-3 ${m.role==="user"?"bg-zinc-50":""}"><p class="text-[10px] font-semibold text-zinc-400 uppercase mb-1">${m.role==="user"?"You":name}</p><p class="text-sm text-zinc-700">${esc(m.content)}</p></div>`).join("")}</div>`;
    }
    return `<div class="wb-pane"><div class="wb-pane-content"><div class="max-w-3xl">
      <div class="flex items-center gap-3 mb-1">
        <span class="text-2xl">${a.emoji}</span>
        <h1 class="text-2xl font-bold">${esc(name)}</h1>
        <span class="text-xs text-green-600 bg-green-50 rounded-full px-2 py-0.5">${a.status === "online" ? "Online" : "Offline"}</span>
        ${name !== w.activeProfile ? `<button data-action="switch-profile" data-agent="${esc(name)}" class="text-xs text-zinc-500 border border-zinc-200 rounded-full px-2 py-0.5 hover:bg-zinc-50 cursor-pointer">Set active</button>` : ""}
      </div>
      <p class="text-sm text-zinc-400 mb-4">${a.role} · ${a.docs.length} documents · ${a.sessions} sessions</p>
      <div class="flex items-center gap-1.5 mb-6 flex-wrap">${tabBar}</div>
      ${body}
    </div></div></div>`;
  }

  function sidebar() {
    const w = state.wb;
    const docBtn = (doc) => `<button data-action="open-doc" data-doc="${doc.id}" class="w-full text-left px-2 py-1 rounded-lg cursor-pointer flex items-center gap-2 ${w.view==="doc"&&w.openDoc===doc.id?"bg-zinc-200/60 font-medium text-zinc-900":"text-zinc-500 hover:bg-zinc-100"}">${ICON.file}<span class="text-[13px] truncate sidebar-label">${esc(doc.title)}</span></button>`;
    return `<div class="wb-sidebar">
      <div class="px-3 pt-3 pb-2"><div class="px-2 py-1.5 flex items-center gap-2"><span class="w-5 h-5 rounded-md bg-zinc-200 flex items-center justify-center text-xs font-bold">A</span><p class="text-sm font-bold sidebar-label">Acme org</p></div></div>
      <div class="px-3 pb-1"><button data-action="go-home" class="w-full text-left px-2 py-1.5 rounded-lg cursor-pointer flex items-center gap-2 ${w.view==="home"?"bg-zinc-200/60 font-medium":"text-zinc-600 hover:bg-zinc-100"}"><span>🏠</span><span class="text-sm sidebar-label">Home</span></button></div>
      <div class="px-3 pb-2"><p class="px-2 text-[10px] font-semibold text-zinc-400 uppercase tracking-widest mb-1 sidebar-section-title">Goals</p>
        <div class="px-2 py-1.5 text-sm font-medium flex gap-2"><span>🎯</span><span class="truncate sidebar-label">Keep KPIs healthy</span></div>
        <div class="ml-4 border-l border-zinc-200 pl-1 sidebar-nested">${DOCUMENTS.filter(d=>["kpi-monitoring","kpi-weekly"].includes(d.id)).map(docBtn).join("")}</div>
        <div class="px-2 py-1.5 text-sm font-medium flex gap-2 mt-1"><span>🛡️</span><span class="truncate sidebar-label">Reliable pipelines</span></div>
        <div class="ml-4 border-l border-zinc-200 pl-1 sidebar-nested">${DOCUMENTS.filter(d=>["pipeline-health"].includes(d.id)).map(docBtn).join("")}</div>
      </div>
      <div class="px-3 pb-2 mt-2"><div class="flex items-center justify-between px-2 mb-1"><p class="text-[10px] font-semibold text-zinc-400 uppercase tracking-widest sidebar-section-title">Teammates</p></div>
        ${Object.entries(PROFILES).map(([name,a])=>`<button data-action="open-agent" data-agent="${name}" class="w-full text-left px-2 py-1.5 rounded-lg cursor-pointer flex items-center gap-2 ${w.view==="agent"&&w.openAgent===name?"bg-zinc-200/60 font-medium":"text-zinc-700 hover:bg-zinc-100"}"><span>${a.emoji}</span><span class="text-sm sidebar-label flex-1 truncate">${name}</span></button>`).join("")}
      </div>
      <div class="px-3 pb-2 mt-2"><p class="px-2 text-[10px] font-semibold text-zinc-400 uppercase tracking-widest mb-1 sidebar-section-title">Knowledge base</p>
        ${(w.kbExpanded?WIKI_PAGES:WIKI_PAGES.slice(0,4)).map(pg=>`<button data-action="open-wiki" data-wiki="${pg.id}" class="w-full text-left px-2 py-1.5 rounded-lg cursor-pointer flex items-center gap-2 ${w.view==="wiki"&&w.openWiki===pg.id?"bg-zinc-200/60 font-medium":"text-zinc-600 hover:bg-zinc-100"}"><span>${pg.icon}</span><span class="text-[13px] truncate sidebar-label">${esc(pg.title)}</span></button>`).join("")}
        <button data-action="toggle-kb" class="w-full text-left px-2 py-1.5 rounded-lg text-[13px] text-zinc-400 hover:bg-zinc-100 cursor-pointer sidebar-label">${w.kbExpanded?"Show less":(WIKI_PAGES.length-4)+" more"}</button>
      </div>
    </div>`;
  }

  function renderWorkbench() {
    const w = state.wb;
    const justOnboarded = !!state.agentInfo?.agentName;
    if (justOnboarded && w.view === "home" && w.openDoc === "kpi-weekly") { w.view = "doc"; w.openDoc = "kpi-monitoring"; }

    let main = "";
    let chat = "";
    if (w.view === "home") {
      chat = chatPanel("db", "Databao", LOGO(20), w.dbMessages, w.dbTyping, w.dbInput, "Message Databao…", databaoEmptyState());
      main = renderHome();
    } else if (w.view === "wiki") {
      chat = chatPanel("db", "Databao", LOGO(20), w.dbMessages, w.dbTyping, w.dbInput, "Message Databao…", databaoEmptyState());
      main = renderWiki();
    } else if (w.view === "profiles") {
      chat = chatPanel("db", "Databao", LOGO(20), w.dbMessages, w.dbTyping, w.dbInput, "Message Databao…", databaoEmptyState());
      main = renderProfiles();
    } else if (w.view === "agent") {
      chat = chatPanel("ask", w.openAgent, `<span class="text-lg">${AGENTS[w.openAgent]?.emoji||""}</span>`, w.askMessages, w.askTyping, w.askInput, `Message ${w.openAgent}…`,
        `<p class="text-sm">Hi, I'm ${esc(w.openAgent)} 👋</p>`);
      main = renderAgent();
    } else if (w.view === "doc") {
      const agent = DOC_CONTENT[w.openDoc]?.agent || "Florence";
      chat = chatPanel("ask", agent, `<span class="text-lg">${AGENTS[agent]?.emoji||"👩‍💻"}</span>`, w.askMessages, w.askTyping, w.askInput, "Ask about this report…",
        `<div class="text-center"><p class="text-sm pb-3">Hi, I'm ${esc(agent)} 👋</p>
        ${["Show the cohort comparison","How confident are you it's the modal?","What would you do next?"].map(q=>`<button data-action="ask-quick" data-text="${esc(q)}" class="w-full text-left text-sm px-3.5 py-2.5 rounded-xl border mb-2 cursor-pointer">${q}</button>`).join("")}</div>`);
      main = renderDoc();
    }
    const split = chat
      ? `<div class="wb-split">${chat}${main}</div>`
      : `<div class="wb-split">${main}</div>`;
    return `<div class="flex h-screen bg-zinc-50 overflow-hidden font-sans min-h-0">${sidebar()}${split}</div>`;
  }

  function render() {
    const app = document.getElementById("app");
    if (state.phase === "onboarding") {
      app.innerHTML = state.ob.screen === "landing" ? renderLanding() : renderOnboarding();
    } else {
      app.innerHTML = renderWorkbench();
    }
    bind();
    const chat = document.getElementById("ob-chat");
    if (chat) chat.scrollTop = chat.scrollHeight;
  }

  function skipOnboarding() {
    state.phase = "product";
    state.wb.view = "home";
    render();
  }

  function startOnboarding(text) {
    state.ob.screen = "onboarding";
    state.ob.messages = [{ role: "ai", content: "Hi, I'm Databao 👋 What's on your plate?", suggestions: null }];
    state.ob.msgCount = 0; state.ob.tasks = []; state.ob.planStep = 0; state.ob.planConfirmed = false; state.ob.conn = {};
    if (text) { state.ob.messages.push({ role: "user", content: text }); state.ob.msgCount = 1; respondScripted(text, 0); }
    render();
  }

  function respondScripted(userText, stepIndex) {
    state.ob.typing = true; render();
    setTimeout(() => {
      state.ob.typing = false;
      const step = SCRIPT[Math.min(stepIndex, SCRIPT.length - 1)];
      if (step.artifact?.tasks) state.ob.tasks = step.artifact.tasks;
      if (step.artifact?.planStep !== undefined) state.ob.planStep = Math.max(state.ob.planStep, step.artifact.planStep);
      state.ob.messages.push({ role: "ai", content: step.reply, suggestions: step.suggestions || null, uiWidget: step.ui ? step.ui(userText) : null, planCard: step.planCard || null });
      render();
    }, 850 + Math.random() * 400);
  }

  function obSend(text) {
    if (!text.trim() || state.ob.typing) return;
    state.ob.input = "";
    state.ob.messages.push({ role: "user", content: text.trim() });
    const step = state.ob.msgCount;
    state.ob.msgCount++;
    respondScripted(text.trim(), step);
  }

  function confirmPlan(plan) {
    state.ob.planConfirmed = true;
    state.ob.planStep = 3;
    render();
    setTimeout(() => {
      state.agentInfo = { agentName: plan.agentName, summary: `The "${plan.goal}" goal is live.` };
      state.phase = "product";
      state.wb.view = "doc";
      state.wb.openDoc = "kpi-monitoring";
      render();
    }, 650);
  }

  function sendChat(kind, text) {
    if (!text.trim()) return;
    const w = state.wb;
    if (kind === "db") {
      if (w.dbTyping) return;
      w.dbInput = "";
      w.dbMessages.push({ role: "user", content: text.trim() });
      w.dbTyping = true; render();
      setTimeout(() => { w.dbTyping = false; w.dbMessages.push({ role: "agent", content: mockDb(text) }); render(); }, 900);
    } else {
      if (w.askTyping) return;
      w.askInput = "";
      w.askMessages.push({ role: "user", content: text.trim() });
      if (w.openAgent) w.profileSessions[w.openAgent] = w.askMessages;
      w.askTyping = true; render();
      const agent = w.view === "agent" ? w.openAgent : (DOC_CONTENT[w.openDoc]?.agent || "Florence");
      setTimeout(() => {
        w.askTyping = false;
        w.askMessages.push({ role: "agent", content: agent === "Ada" ? mockAda(text) : mockFlorence(text) });
        if (w.openAgent) {
          w.profileSessions[w.openAgent] = w.askMessages;
          if (PROFILES[w.openAgent]) PROFILES[w.openAgent].sessions = w.askMessages.length;
        }
        render();
      }, 900);
    }
  }

  function bind() {
    const app = document.getElementById("app");
    app.onclick = e => {
      const el = e.target.closest("[data-action]");
      if (!el) return;
      if (el.dataset.action === "modal-stop") return;
      const a = el.dataset.action, t = el.dataset.text, i = el.dataset.i;
      if (a === "skip-onboarding") skipOnboarding();
      if (a === "start-chip" || a === "start-send" || a === "start-continue") startOnboarding(state.ob.input.trim() || t);
      if (a === "ob-send") obSend(t);
      if (a === "ob-send-btn") obSend(state.ob.input);
      if (a === "confirm-plan") confirmPlan(state.ob.messages[+el.dataset.idx].planCard);
      if (a === "edit-plan") obSend("I'd like to change something");
      if (a === "conn-connect") {
        const key = el.dataset.key, tool = el.dataset.tool;
        const c = state.ob.conn[key] || { accountId: "" };
        if (!c.accountId.trim()) return;
        c.phase = "redirecting"; state.ob.conn[key] = c; render();
        setTimeout(() => { c.phase = "done"; state.ob.conn[key] = c; render(); setTimeout(() => obSend(tool + " connected"), 400); }, 1400);
      }
      if (a === "go-home") { state.wb.view = "home"; state.wb.askMessages = []; render(); }
      if (a === "open-doc") { state.wb.view = "doc"; state.wb.openDoc = el.dataset.doc; state.wb.askMessages = []; render(); }
      if (a === "open-agent") { loadProfileChat(el.dataset.agent); state.wb.view = "agent"; state.wb.profileTab = "overview"; render(); }
      if (a === "open-profiles") { state.wb.view = "profiles"; render(); }
      if (a === "switch-profile") { loadProfileChat(el.dataset.agent); render(); }
      if (a === "profile-tab") { state.wb.profileTab = el.dataset.tab; render(); }
      if (a === "open-create-profile") { state.wb.showCreateProfile = true; render(); }
      if (a === "close-create-profile") { state.wb.showCreateProfile = false; render(); }
      if (a === "create-profile") {
        const n = state.wb.newProfile, name = n.name.trim();
        if (!name || PROFILES[name]) return;
        const port = 8642 + Object.keys(PROFILES).length;
        PROFILES[name] = {
          emoji: n.emoji || "🤖", role: n.role || "Custom teammate", docs: [], tasks: 0,
          soul: n.soul || "A new teammate cloned from the default profile.",
          tags: n.role ? [n.role] : [],
          persona: {
            tone: "Professional and helpful — adapts to your team's communication style.",
            skills: n.role ? [{ name: n.role, level: "Developing", desc: "Primary focus area for this teammate." }] : [],
            responsibilities: [],
            boundaries: "Escalates tasks outside defined scope to the appropriate teammate.",
            tools: ["Snowflake"],
          },
          status: "online", gateway: port, sessions: 0, isDefault: false,
          config: { provider: "Anthropic", model: "claude-sonnet-4", sources: ["Snowflake"], integrations: [] },
        };
        state.wb.profileSessions[name] = [];
        state.wb.activeProfile = name;
        state.wb.showCreateProfile = false;
        state.wb.newProfile = { name: "", emoji: "🤖", role: "", soul: "" };
        loadProfileChat(name);
        state.wb.view = "agent";
        render();
      }
      if (a === "open-wiki") { state.wb.view = "wiki"; state.wb.openWiki = el.dataset.wiki; render(); }
      if (a === "toggle-kb") { state.wb.kbExpanded = !state.wb.kbExpanded; render(); }
      if (a === "dismiss-need") { state.wb.doneNeeds.push(+i); render(); }
      if (a === "db-send") sendChat("db", state.wb.dbInput);
      if (a === "db-quick") sendChat("db", t);
      if (a === "ask-send") sendChat("ask", state.wb.askInput);
      if (a === "ask-quick") sendChat("ask", t);
    };
    app.oninput = e => {
      if (e.target.id === "landing-input") state.ob.input = e.target.value;
      if (e.target.id === "ob-input") state.ob.input = e.target.value;
      if (e.target.id === "db-input") state.wb.dbInput = e.target.value;
      if (e.target.id === "ask-input") state.wb.askInput = e.target.value;
      if (e.target.dataset.action === "conn-input") {
        const key = e.target.dataset.key;
        state.ob.conn[key] = { ...(state.ob.conn[key]||{}), accountId: e.target.value, phase: "input" };
        updateConnButton(key);
      }
      if (e.target.dataset.action === "new-profile-field") {
        state.wb.newProfile[e.target.dataset.field] = e.target.value;
        render();
      }
    };
    app.onkeydown = e => {
      if (e.key !== "Enter" || e.shiftKey) return;
      if (e.target.id === "landing-input" && state.ob.input.trim()) { e.preventDefault(); startOnboarding(state.ob.input.trim()); }
      if (e.target.id === "ob-input") { e.preventDefault(); obSend(state.ob.input); }
      if (e.target.id === "db-input") { e.preventDefault(); sendChat("db", state.wb.dbInput); }
      if (e.target.id === "ask-input") { e.preventDefault(); sendChat("ask", state.wb.askInput); }
      if (e.target.dataset.action === "conn-input") { e.preventDefault(); e.target.closest("[data-action=conn-connect]")?.click(); }
    };
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", render);
  } else {
    render();
  }
})();
  </script>
</body>
</html>
